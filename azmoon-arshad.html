<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111621">
  <title>آزمون ارشد</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("azmoon-arshad-theme") === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.colorScheme = theme;
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <style>
@font-face {
  font-family: "Vazir-FD";
  src: url("fonts/Vazir-FD.ttf") format("truetype");
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root,
[data-theme="dark"] {
  --bg: #111621;
  --surface: #212833;
  --surface-2: #1e2636;
  --border: #2a3344;
  --text: #ffffff;
  --muted: #8b95a8;
  --muted-2: #6b778c;
  --accent: #00e5a0;
  --accent-soft: rgba(0, 229, 160, 0.14);
  --accent-fg: #111621;
  --danger: #ff4d6d;
  --danger-soft: rgba(255, 77, 109, 0.14);
  --warn: #fbbf24;
  --warn-soft: rgba(251, 191, 36, 0.14);
  --info: #60a5fa;
  --info-soft: rgba(96, 165, 250, 0.14);
  --max-w: 720px;
  --border-strong: #2a3344;
  --input-bg: #111621;
  --update-icon-bg: rgba(0, 229, 160, 0.14);
  --update-icon-ring: rgba(0, 229, 160, 0.08);
  --update-icon-fg: #00e5a0;
}

[data-theme="light"] {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --muted-2: #94a3b8;
  --accent: #059669;
  --accent-soft: rgba(5, 150, 105, 0.12);
  --accent-fg: #ffffff;
  --danger: #e11d48;
  --danger-soft: rgba(225, 29, 72, 0.1);
  --warn: #d97706;
  --warn-soft: rgba(217, 119, 6, 0.12);
  --info: #2563eb;
  --info-soft: rgba(37, 99, 235, 0.1);
  --border-strong: #cbd5e1;
  --input-bg: #ffffff;
  --update-icon-bg: rgba(5, 150, 105, 0.12);
  --update-icon-ring: rgba(5, 150, 105, 0.08);
  --update-icon-fg: #059669;
}

html, body {
  height: 100%;
  font-family: "Vazir-FD", Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

#app {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 16px 16px 32px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 0 16px;
}

.topbar h1 {
  font-size: 18px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.icon-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 12px;
  min-width: 40px;
  height: 40px;
  padding: 0 12px;
  font-family: inherit;
  font-size: 15px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.card.tappable { cursor: pointer; transition: transform 0.08s ease; }
.card.tappable:active { transform: scale(0.98); }

.group-card { display: flex; align-items: center; gap: 14px; }
.group-card .emoji {
  font-size: 26px;
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: var(--accent-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.group-card .info { flex: 1; min-width: 0; }
.group-card .title { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.group-card .badge {
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-soft);
  border-radius: 8px;
  padding: 2px 8px;
  font-weight: 700;
}
.group-card .desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.8; }
.group-card .meta { font-size: 11px; color: var(--muted-2); margin-top: 6px; }
.group-card .chev { color: var(--muted-2); font-size: 18px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 8px;
  text-align: center;
}
.stat-box .num { font-size: 20px; font-weight: 800; color: var(--accent); }
.stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-title .link { color: var(--accent); font-size: 12px; cursor: pointer; background: none; border: none; font-family: inherit; }

.exam-card .row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.exam-card .title { font-weight: 700; font-size: 14px; line-height: 1.8; }
.exam-card .meta { font-size: 11.5px; color: var(--muted); margin-top: 8px; display: flex; flex-wrap: wrap; gap: 12px; }
.exam-card .best {
  font-size: 11px;
  font-weight: 700;
  border-radius: 10px;
  padding: 4px 10px;
  white-space: nowrap;
}
.best.good { color: var(--accent); background: var(--accent-soft); }
.best.mid { color: var(--warn); background: var(--warn-soft); }
.best.bad { color: var(--danger); background: var(--danger-soft); }
.best.none { color: var(--muted-2); background: var(--surface-2); }

.btn {
  display: block;
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
}
.btn-primary { background: var(--accent); color: var(--accent-fg); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger-soft); color: var(--danger); }
.btn + .btn { margin-top: 10px; }
.btn:disabled { opacity: 0.5; cursor: default; }

/* exam screen */
.exam-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-bottom: 12px;
}
.timer {
  font-weight: 800;
  font-size: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 14px;
  min-width: 86px;
  text-align: center;
  direction: ltr;
}
.timer.low { color: var(--danger); border-color: var(--danger); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.55; } }

.progress-track {
  height: 6px;
  border-radius: 3px;
  background: var(--surface-2);
  overflow: hidden;
  margin-bottom: 14px;
}
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.25s ease; }

.qnav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  margin-bottom: 6px;
  scrollbar-width: none;
}
.qnav::-webkit-scrollbar { display: none; }
.qnav button {
  min-width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}
.qnav button.answered { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
.qnav button.current { border-color: var(--accent); color: var(--text); }
.qnav button.flagged::after {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--warn);
}

.subject-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--info);
  background: var(--info-soft);
  border-radius: 8px;
  padding: 3px 10px;
  margin-bottom: 10px;
}

.reading-box {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-size: 13px;
  line-height: 2;
  margin-bottom: 12px;
  direction: ltr;
  text-align: left;
  max-height: 220px;
  overflow-y: auto;
}

.question-text { font-size: 15px; font-weight: 700; line-height: 2.1; margin-bottom: 14px; }
.question-text.ltr { direction: ltr; text-align: left; }

.option {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  text-align: right;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 13px 14px;
  margin-bottom: 10px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  line-height: 1.9;
}
.option .key {
  width: 28px;
  height: 28px;
  border-radius: 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}
.option.ltr { direction: ltr; text-align: left; }
.option.selected { border-color: var(--accent); background: var(--accent-soft); }
.option.selected .key { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
.option.correct { border-color: var(--accent); background: var(--accent-soft); }
.option.correct .key { background: var(--accent); color: var(--accent-fg); }
.option.wrong { border-color: var(--danger); background: var(--danger-soft); }
.option.wrong .key { background: var(--danger); color: #fff; }

.exam-actions { display: flex; gap: 8px; }
.exam-actions .btn { flex: 1; padding: 12px; font-size: 14px; }

/* نوار دکمه‌های آزمون — پایین صفحه فیکس تا با طول سؤال جابجا نشود */
.exam-actionbar {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 0;
  width: 100%;
  max-width: var(--max-w);
  z-index: 3000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 16px calc(12px + env(safe-area-inset-bottom, 0px));
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.exam-actionbar .btn { margin: 0; }

/* جا برای نوار فیکس، تا آخرین گزینه پشت آن پنهان نشود */
body.exam-mode #app {
  padding-bottom: 160px;
}

[data-theme="light"] .exam-actionbar {
  background: rgba(241, 245, 249, 0.92);
  border-top-color: var(--border);
}
.flag-btn.on { color: var(--warn); border-color: var(--warn); }

.footer-note { text-align: center; font-size: 11px; color: var(--muted-2); margin-top: auto; padding-top: 24px; line-height: 1.9; }

/* result */
.score-hero {
  text-align: center;
  padding: 26px 16px;
}
.score-ring {
  width: 148px;
  height: 148px;
  margin: 0 auto 14px;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .val {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
}
.score-ring .val small { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
.score-verdict { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
.score-verdict.good { color: var(--accent); }
.score-verdict.mid { color: var(--warn); }
.score-verdict.bad { color: var(--danger); }
.score-sub { font-size: 12px; color: var(--muted); line-height: 1.9; }

.result-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.result-grid .stat-box .num { font-size: 17px; }
.num.ok { color: var(--accent); }
.num.bad { color: var(--danger); }
.num.blank { color: var(--muted); }
.num.info { color: var(--info); }

.subject-row { margin-bottom: 12px; }
.subject-row .head { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 6px; }
.subject-row .head .pct { font-weight: 800; direction: ltr; }
.subject-row .bar { height: 8px; border-radius: 4px; background: var(--surface-2); overflow: hidden; direction: ltr; }
.subject-row .bar > div { height: 100%; border-radius: 4px; }
.subject-row .detail { font-size: 10.5px; color: var(--muted-2); margin-top: 4px; }

/* review */
.review-q { margin-bottom: 14px; }
.review-q .qhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
.review-q .qnum { font-size: 12px; font-weight: 700; color: var(--muted); }
.review-status { font-size: 11px; font-weight: 700; border-radius: 8px; padding: 3px 10px; }
.review-status.ok { color: var(--accent); background: var(--accent-soft); }
.review-status.bad { color: var(--danger); background: var(--danger-soft); }
.review-status.blank { color: var(--muted); background: var(--surface-2); }
.explanation {
  background: var(--info-soft);
  border-radius: 12px;
  padding: 12px;
  font-size: 12.5px;
  line-height: 2;
  color: var(--text);
  margin-top: 4px;
}
.explanation b { color: var(--info); }

/* history */
.history-item .row1 { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.history-item .title { font-size: 13px; font-weight: 700; line-height: 1.8; }
.history-item .date { font-size: 11px; color: var(--muted-2); margin-top: 4px; }
.history-item .pct { font-size: 16px; font-weight: 800; direction: ltr; white-space: nowrap; }
.pct.good { color: var(--accent); }
.pct.mid { color: var(--warn); }
.pct.bad { color: var(--danger); }

.empty-note { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 16px; line-height: 2; }

/* ---------- ناوبری پایین (مانند اپلیکیشن قیمت دلار و طلا) ---------- */

body.has-bottom-nav #app {
  padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
}

.market-bottom-nav {
  position: fixed;
  left: 50%;
  bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  transform: translateX(-50%);
  width: min(480px, calc(100% - 16px));
  z-index: 4000;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0;
  padding: 10px 6px 8px;
  background: color-mix(in srgb, var(--surface) 94%, transparent);
  border: 1px solid var(--border-strong, var(--border));
  border-radius: 22px;
  box-shadow: 0 10px 36px rgba(0, 0, 0, .45);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.market-nav-btn {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: 44px;
  padding: 6px 2px 4px;
  border: none;
  border-radius: 14px;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  line-height: 1;
  cursor: pointer;
  transition: color 0.15s, transform 0.15s, background-color 0.15s;
}

.market-nav-btn:hover {
  color: var(--text);
  background: color-mix(in srgb, var(--surface-2) 70%, transparent);
}

.market-nav-btn.is-active {
  color: var(--accent);
  background: transparent;
}

.market-nav-btn:active { transform: scale(0.96); }

.market-nav-svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
  fill: none;
}

.market-nav-label {
  font-size: 10px;
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
}

.market-nav-fab-wrap {
  flex: 0 0 auto;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding: 0 4px 2px;
}

.market-nav-fab {
  width: 56px;
  height: 56px;
  margin-top: -28px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(145deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #06b6d4));
  color: var(--accent-fg, #111621);
  box-shadow:
    0 8px 24px color-mix(in srgb, var(--accent) 42%, transparent),
    0 0 0 5px color-mix(in srgb, var(--bg) 70%, transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}

.market-nav-fab:hover { transform: translateY(-2px) scale(1.03); }
.market-nav-fab:active { transform: scale(0.96); }

.market-nav-fab svg {
  width: 22px;
  height: 22px;
}

[data-theme="light"] .market-bottom-nav {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
}

/* ---------- تب «بیشتر» (مانند اپلیکیشن قیمت دلار و طلا) ---------- */

.market-more-section {
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  padding: 12px;
  margin-bottom: 12px;
}

.market-more-section-title {
  margin: 0 0 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
}

.market-more-row {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 0;
  border: none;
  border-top: 1px solid var(--border);
  background: transparent;
  color: inherit;
  font-family: inherit;
  font-size: 13px;
  text-align: right;
  cursor: pointer;
}

.market-more-section > .market-more-row:first-of-type {
  border-top: none;
  padding-top: 0;
}

.market-more-row-static {
  cursor: default;
}

.market-more-row-label {
  color: var(--text);
  font-weight: 600;
}

.market-more-row-value {
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
}

.market-more-hint {
  margin: 8px 0 0;
  font-size: 11px;
  line-height: 1.8;
  color: var(--muted-2);
}

.market-more-copyright {
  margin: 4px 0 0;
  padding: 12px 4px 4px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  line-height: 1.6;
}

.market-more-copyright .accent {
  color: var(--accent);
  font-weight: 700;
  margin: 0 4px;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
}

/* ---------- شیت بروزرسانی (مانند اپلیکیشن قیمت دلار و طلا) ---------- */

.update-sheet-overlay { position: fixed; inset: 0; z-index: 6000; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
.update-sheet-overlay:not(.hidden) { pointer-events: auto; }
.update-sheet-overlay.hidden { display: none; }
.update-sheet-backdrop { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease; }
.update-sheet-overlay.open .update-sheet-backdrop { opacity: 1; }
.update-sheet { position: relative; width: 100%; max-width: var(--max-w); margin: 0 auto; min-height: 240px; max-height: 320px; background: var(--surface); border: 1px solid var(--border-strong); border-bottom: none; border-radius: 24px 24px 0 0; box-shadow: 0 -12px 40px rgba(15, 23, 42, 0.18); transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); display: flex; flex-direction: column; padding: 8px 22px calc(22px + env(safe-area-inset-bottom, 0px)); overflow: hidden; }
.update-sheet::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.85; }
.update-sheet-overlay.open .update-sheet { transform: translateY(0); }
.update-sheet-handle { width: 40px; height: 4px; background: var(--border-strong); border-radius: 999px; margin: 4px auto 12px; flex-shrink: 0; }
.update-sheet-content { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; min-height: 0; padding-top: 4px; }
.update-sheet-icon-wrap { width: 64px; height: 64px; border-radius: 50%; background: var(--update-icon-ring); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.update-sheet-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--update-icon-bg); color: var(--update-icon-fg); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12); }
.update-sheet-icon svg { width: 24px; height: 24px; display: block; }
.update-sheet-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.update-sheet-message { font-size: 13px; line-height: 1.75; color: var(--muted); flex: 1; max-width: 28rem; padding: 0 4px; }
.update-sheet-actions { display: flex; gap: 10px; width: 100%; flex-shrink: 0; }
.update-sheet-btn { flex: 1; padding: 12px 16px; border-radius: 12px; font-family: inherit; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s; }
.update-sheet-btn:active { opacity: 0.85; }
.update-sheet-btn-primary { background: var(--accent); color: var(--accent-fg); box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 28%, transparent); }

.update-sheet-progress {
  width: 100%;
  margin-top: 4px;
  margin-bottom: 4px;
}

.update-sheet-progress.hidden { display: none !important; }

.update-sheet-progress-track {
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  overflow: hidden;
}

.update-sheet-progress-fill {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 65%, #06b6d4));
  transition: width 0.2s ease;
}

.update-sheet-progress-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}

#updateSheetProgressPercent {
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

.update-sheet.downloading .update-sheet-actions { display: none; }
.update-sheet.downloading .update-sheet-handle { opacity: 0.35; }
.update-sheet-overlay.mandatory .update-sheet-backdrop { pointer-events: none; }

body:has(.update-sheet-overlay.open) .market-bottom-nav {
  pointer-events: none;
  opacity: 0.35;
}

/* confirm sheet */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 50;
}
.sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: var(--max-w);
  border: 1px solid var(--border);
  border-bottom: none;
}
.sheet h3 { font-size: 16px; margin-bottom: 8px; }
.sheet p { font-size: 13px; color: var(--muted); line-height: 2; margin-bottom: 16px; }

  </style>
</head>
<body>
  <div id="app"></div>
  <div id="updateSheetOverlay" class="update-sheet-overlay mandatory hidden" aria-hidden="true">
    <div id="updateSheetBackdrop" class="update-sheet-backdrop" aria-hidden="true"></div>
    <div id="updateSheet" class="update-sheet" role="dialog" aria-modal="true" aria-labelledby="updateSheetTitle">
      <div class="update-sheet-handle" aria-hidden="true"></div>
      <div class="update-sheet-content">
        <div class="update-sheet-icon-wrap" aria-hidden="true"><div class="update-sheet-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg></div></div>
        <h2 id="updateSheetTitle" class="update-sheet-title">نسخه جدید اپلیکیشن موجود است</h2>
        <p id="updateSheetMessage" class="update-sheet-message"></p>
        <div id="updateSheetProgress" class="update-sheet-progress hidden" aria-live="polite">
          <div class="update-sheet-progress-track">
            <span id="updateSheetProgressFill" class="update-sheet-progress-fill"></span>
          </div>
          <div class="update-sheet-progress-meta">
            <span id="updateSheetProgressLabel">در حال دریافت بروزرسانی...</span>
            <span id="updateSheetProgressPercent">۰٪</span>
          </div>
        </div>
        <div class="update-sheet-actions" id="updateSheetActions">
          <button type="button" id="updateSheetConfirmBtn" class="update-sheet-btn update-sheet-btn-primary">دریافت نسخه جدید</button>
        </div>
      </div>
    </div>
  </div>
  <script>
const QUESTION_BANK = {"version":"1.0.0","groups":[{"id":"general","title":"دروس عمومی (مشترک همه رشته‌ها)","icon":"📚","description":"زبان عمومی و استعداد تحصیلی — مشترک بین اکثر رشته‌های کارشناسی ارشد","exams":[{"id":"gen-english-1","title":"زبان عمومی ارشد — آزمون ۱ (واژگان و گرامر)","durationMinutes":20,"subjectsLabel":"واژگان، گرامر","questions":[{"subject":"واژگان","q":"The new policy will ............ small businesses that cannot afford the extra taxes.","options":["adversely affect","properly enhance","gradually promote","financially support"],"answer":0,"explanation":"adversely affect یعنی «تأثیر منفی گذاشتن». جمله می‌گوید کسب‌وکارهای کوچکی که توان پرداخت مالیات اضافه را ندارند، آسیب می‌بینند."},{"subject":"واژگان","q":"Despite years of research, scientists have not yet found a ............ cure for the disease.","options":["temporary","definitive","marginal","redundant"],"answer":1,"explanation":"definitive cure یعنی «درمان قطعی». با «با وجود سال‌ها تحقیق هنوز پیدا نشده» تنها گزینه معنادار است."},{"subject":"واژگان","q":"The lecturer's explanation was so ............ that even beginners could understand the complex theory.","options":["obscure","ambiguous","lucid","tedious"],"answer":2,"explanation":"lucid یعنی «روشن و شفاف». obscure و ambiguous یعنی مبهم و tedious یعنی خسته‌کننده که با «حتی مبتدی‌ها فهمیدند» تناقض دارند."},{"subject":"واژگان","q":"Regular exercise can significantly ............ the risk of heart disease.","options":["mitigate","aggravate","accumulate","stimulate"],"answer":0,"explanation":"mitigate یعنی «کاهش دادن، تخفیف دادن». ورزش منظم خطر بیماری قلبی را کاهش می‌دهد. aggravate یعنی تشدید کردن."},{"subject":"واژگان","q":"The two researchers reached the same conclusion ............, without knowing about each other's work.","options":["consecutively","independently","reluctantly","deliberately"],"answer":1,"explanation":"independently یعنی «مستقلاً». عبارت «بدون اطلاع از کار یکدیگر» دقیقاً همین معنا را تأیید می‌کند."},{"subject":"واژگان","q":"Water shortage is one of the most ............ problems facing the region today.","options":["trivial","obsolete","pressing","reversible"],"answer":2,"explanation":"pressing problem یعنی «مشکل مبرم و فوری». trivial یعنی جزئی و obsolete یعنی منسوخ."},{"subject":"واژگان","q":"The company decided to ............ its outdated equipment with modern machinery.","options":["replace","restore","resemble","retain"],"answer":0,"explanation":"replace ... with یعنی «جایگزین کردن با». retain یعنی نگه داشتن که متضاد منظور جمله است."},{"subject":"واژگان","q":"His argument was based on ............ evidence, so the committee rejected his proposal.","options":["compelling","conclusive","insufficient","abundant"],"answer":2,"explanation":"چون کمیته پیشنهاد را «رد کرد»، شواهد باید «ناکافی» (insufficient) بوده باشند."},{"subject":"گرامر","q":"By the time the firefighters arrived, the building ............ completely.","options":["has burned","had burned","was burning","burns"],"answer":1,"explanation":"برای عملی که قبل از عمل دیگری در گذشته کامل شده، از گذشته کامل (had + p.p.) استفاده می‌شود."},{"subject":"گرامر","q":"Not until the results were published ............ how successful the experiment had been.","options":["the researchers realized","did the researchers realize","the researchers did realize","realized the researchers"],"answer":1,"explanation":"وقتی جمله با عبارت منفی مثل Not until شروع شود، فاعل و فعل کمکی جابه‌جا می‌شوند (inversion): did the researchers realize."},{"subject":"گرامر","q":"The professor insisted that every student ............ the assignment before the deadline.","options":["submits","submitted","submit","would submit"],"answer":2,"explanation":"بعد از افعالی مانند insist، suggest و recommend در حالت subjunctive، فعل به‌صورت مصدر ساده (بدون s) می‌آید: insist that he submit."},{"subject":"گرامر","q":"............ the difficulty of the task, they managed to finish it on time.","options":["Despite of","Although","In spite of","Even though"],"answer":2,"explanation":"قبل از اسم (the difficulty) فقط In spite of یا Despite (بدون of) به کار می‌رود. Although و Even though نیاز به جمله کامل دارند."},{"subject":"گرامر","q":"The report, ............ findings were published last week, has caused much debate.","options":["which","whose","that","its"],"answer":1,"explanation":"برای نشان دادن مالکیت در جمله موصولی از whose استفاده می‌شود: گزارشی که «یافته‌هایش» منتشر شد."},{"subject":"گرامر","q":"If the samples ............ properly, the experiment would not have failed.","options":["were stored","had been stored","have been stored","would be stored"],"answer":1,"explanation":"جمله شرطی نوع سوم (گذشته غیرواقعی): If + had + p.p. در بخش شرط و would have + p.p. در جواب شرط."},{"subject":"گرامر","q":"Rarely ............ such a comprehensive study on this subject.","options":["we have seen","we see","have we seen","we saw"],"answer":2,"explanation":"قید منفی Rarely در ابتدای جمله باعث inversion می‌شود: Rarely have we seen."}]},{"id":"gen-english-2","title":"زبان عمومی ارشد — آزمون ۲ (درک مطلب و کلوز)","durationMinutes":25,"subjectsLabel":"درک مطلب، کلوز تست","readings":[{"id":"r1","title":"Reading Passage","text":"Sleep plays a vital role in learning and memory. During deep sleep, the brain consolidates information acquired during the day, transferring it from short-term to long-term storage. Studies have shown that students who sleep adequately after studying perform significantly better on tests than those who stay up all night reviewing material. Sleep deprivation, on the other hand, impairs attention, working memory, and decision-making. Researchers therefore recommend that students maintain a regular sleep schedule, especially during examination periods, rather than sacrificing sleep for extra hours of study."}],"questions":[{"subject":"درک مطلب","reading":"r1","q":"What is the main idea of the passage?","options":["Students should study more at night.","Sleep is essential for learning and memory.","Tests measure long-term memory only.","Decision-making is unrelated to sleep."],"answer":1,"explanation":"کل متن درباره نقش حیاتی خواب در یادگیری و حافظه است؛ جمله اول متن نیز دقیقاً همین را می‌گوید."},{"subject":"درک مطلب","reading":"r1","q":"According to the passage, during deep sleep the brain ............ .","options":["erases unnecessary short-term memories","moves information into long-term storage","stops processing information completely","reviews material like a student"],"answer":1,"explanation":"متن می‌گوید مغز اطلاعات را از حافظه کوتاه‌مدت به بلندمدت منتقل می‌کند (transferring it from short-term to long-term storage)."},{"subject":"درک مطلب","reading":"r1","q":"The word \"impairs\" in the passage is closest in meaning to ............ .","options":["improves","weakens","measures","restores"],"answer":1,"explanation":"impair یعنی «آسیب زدن و ضعیف کردن»؛ کم‌خوابی توجه و حافظه کاری را ضعیف می‌کند. نزدیک‌ترین واژه weakens است."},{"subject":"درک مطلب","reading":"r1","q":"What do researchers recommend to students?","options":["Staying up all night before exams","Studying only during the day","Keeping a regular sleep schedule","Avoiding tests when tired"],"answer":2,"explanation":"جمله آخر متن: پژوهشگران توصیه می‌کنند دانشجویان برنامه خواب منظم داشته باشند، به‌ویژه در ایام امتحانات."},{"subject":"درک مطلب","reading":"r1","q":"It can be inferred from the passage that an all-night study session before a test is ............ .","options":["counterproductive","unavoidable","beneficial","traditional"],"answer":0,"explanation":"متن می‌گوید دانشجویانی که می‌خوابند بهتر از شب‌بیدارها عمل می‌کنند؛ پس شب‌بیداری نتیجه معکوس دارد (counterproductive)."},{"subject":"کلوز تست","q":"Global warming is ............ considered one of the greatest threats to biodiversity.","options":["widely","narrowly","hardly","scarcely"],"answer":0,"explanation":"widely considered یعنی «به‌طور گسترده‌ای ... تلقی می‌شود» — ترکیب رایج (collocation) در انگلیسی آکادمیک."},{"subject":"کلوز تست","q":"Many species will become extinct ............ urgent measures are taken to protect their habitats.","options":["if","unless","because","since"],"answer":1,"explanation":"unless یعنی «مگر اینکه»: گونه‌ها منقرض می‌شوند مگر اینکه اقدامات فوری انجام شود."},{"subject":"کلوز تست","q":"The rate of deforestation has increased dramatically ............ the last three decades.","options":["since","over","from","until"],"answer":1,"explanation":"over the last three decades یعنی «طی سه دهه اخیر». برای بازه زمانی با حال کامل، over/during صحیح است؛ since نیاز به نقطه شروع دارد."},{"subject":"کلوز تست","q":"Scientists warn that ............ action is taken now, the damage may become irreversible.","options":["whether","however","unless","despite"],"answer":2,"explanation":"ساختار شرطی منفی: «مگر اینکه همین حالا اقدام شود، آسیب برگشت‌ناپذیر خواهد شد» — unless."},{"subject":"کلوز تست","q":"Conservation programs, ............ expensive, are essential for future generations.","options":["despite","although","because of","owing to"],"answer":1,"explanation":"although + صفت (حذف فعل to be): although (they are) expensive. despite نیاز به اسم دارد."},{"subject":"واژگان","q":"The government allocated additional funds to ............ the effects of the economic crisis.","options":["alleviate","elevate","aggravate","celebrate"],"answer":0,"explanation":"alleviate یعنی «کاستن و تسکین دادن» اثرات بحران. aggravate یعنی بدتر کردن و elevate یعنی بالا بردن."},{"subject":"واژگان","q":"Her research makes a significant ............ to our understanding of climate change.","options":["contribution","distribution","restriction","prescription"],"answer":0,"explanation":"make a contribution to یعنی «سهم و کمک به». ترکیب ثابت significant contribution بسیار پرتکرار در متون علمی است."},{"subject":"واژگان","q":"The findings of the study are ............ with previous research in this field.","options":["consistent","insistent","resistant","persistent"],"answer":0,"explanation":"consistent with یعنی «سازگار و هم‌راستا با». عبارت رایج در مقالات علمی برای تأیید نتایج قبلی."},{"subject":"واژگان","q":"Due to the ambiguity of the question, the students asked the teacher to ............ it.","options":["clarify","classify","certify","quantify"],"answer":0,"explanation":"چون سؤال مبهم (ambiguous) بود، خواستند آن را «شفاف‌سازی» کند: clarify."},{"subject":"واژگان","q":"The committee will ............ all applications and announce the results next month.","options":["evaluate","evacuate","evaporate","elaborate"],"answer":0,"explanation":"evaluate یعنی «ارزیابی کردن» درخواست‌ها. سایر گزینه‌ها (تخلیه کردن، تبخیر شدن، بسط دادن) بی‌ربط‌اند."}]},{"id":"gen-gmat-1","title":"استعداد تحصیلی — آزمون ۱","durationMinutes":30,"subjectsLabel":"درک مطلب تحلیلی، کمّی، منطقی","questions":[{"subject":"استدلال کمّی","q":"اگر قیمت کالایی ابتدا ۲۰٪ افزایش و سپس ۲۰٪ کاهش یابد، قیمت نهایی نسبت به قیمت اولیه چه تغییری کرده است؟","options":["بدون تغییر","۴٪ کاهش","۴٪ افزایش","۲٪ کاهش"],"answer":1,"explanation":"قیمت نهایی = ۱٫۲ × ۰٫۸ = ۰٫۹۶ برابر قیمت اولیه؛ یعنی ۴٪ کاهش."},{"subject":"استدلال کمّی","q":"میانگین ۵ عدد برابر ۱۲ است. اگر عدد ۳۰ به این اعداد اضافه شود، میانگین جدید چقدر است؟","options":["۱۴","۱۵","۱۶","۱۸"],"answer":1,"explanation":"مجموع ۵ عدد = ۶۰؛ با اضافه شدن ۳۰، مجموع = ۹۰ و تعداد = ۶؛ میانگین = ۹۰ ÷ ۶ = ۱۵."},{"subject":"استدلال کمّی","q":"کارگری کاری را در ۶ روز و کارگر دیگری همان کار را در ۱۲ روز انجام می‌دهد. اگر با هم کار کنند، کار در چند روز تمام می‌شود؟","options":["۹ روز","۸ روز","۴ روز","۳ روز"],"answer":2,"explanation":"نرخ کار مشترک = ۱/۶ + ۱/۱۲ = ۳/۱۲ = ۱/۴؛ پس کار در ۴ روز تمام می‌شود."},{"subject":"استدلال کمّی","q":"در دنباله ۲، ۶، ۱۲، ۲۰، ۳۰، ... جمله بعدی کدام است؟","options":["۴۰","۴۲","۴۴","۴۸"],"answer":1,"explanation":"الگوی دنباله n(n+1) است: ۱×۲=۲، ۲×۳=۶، ۳×۴=۱۲، ۴×۵=۲۰، ۵×۶=۳۰، ۶×۷=۴۲."},{"subject":"استدلال کمّی","q":"اگر ۴۰٪ عددی برابر ۶۰ باشد، ۷۵٪ همان عدد چقدر است؟","options":["۹۰","۱۰۰","۱۱۲٫۵","۱۲۰"],"answer":2,"explanation":"عدد = ۶۰ ÷ ۰٫۴ = ۱۵۰؛ پس ۷۵٪ × ۱۵۰ = ۱۱۲٫۵."},{"subject":"استدلال منطقی","q":"همه مدیران موفق، شنوندگان خوبی هستند. برخی شنوندگان خوب، سخنرانان ماهری‌اند. کدام نتیجه «قطعاً» درست است؟","options":["برخی مدیران موفق سخنران ماهرند","همه سخنرانان ماهر مدیر موفق‌اند","هیچ نتیجه قطعی درباره رابطه مدیران موفق و سخنرانان ماهر نمی‌توان گرفت","شنوندگان خوب همیشه مدیر موفق‌اند"],"answer":2,"explanation":"از «همه A، B هستند» و «برخی B، C هستند» نمی‌توان نتیجه قطعی درباره رابطه A و C گرفت؛ ممکن است اشتراک آن دو گروه از B خارج از A باشد."},{"subject":"استدلال منطقی","q":"اگر گزاره «هر دانشجوی کوشا در آزمون قبول می‌شود» درست باشد، کدام گزینه لزوماً درست است؟","options":["هر که قبول شود کوشا بوده است","هر که قبول نشود کوشا نبوده است","هر دانشجوی غیرکوشا مردود می‌شود","برخی قبول‌شدگان کوشا نیستند"],"answer":1,"explanation":"عکس نقیض گزاره شرطی همیشه هم‌ارز آن است: «اگر کوشا ⟵ قبول» هم‌ارز است با «اگر قبول نشد ⟵ کوشا نبوده»."},{"subject":"استدلال منطقی","q":"پنج نفر A، B، C، D و E در یک ردیف نشسته‌اند. C دقیقاً در وسط است، D در یکی از دو انتها نشسته و A بلافاصله سمت راست C است. اگر B کنار D نباشد، چه کسی کنار D نشسته است؟","options":["A","B","E","C"],"answer":2,"explanation":"C در جایگاه ۳ و A در جایگاه ۴ است. D در جایگاه ۱ یا ۵ است. همسایه D فقط می‌تواند از بین B و E باشد (A و C جایشان مشخص است)؛ چون B کنار D نیست، ناچار E کنار D می‌نشیند."},{"subject":"استدلال منطقی","q":"«هیچ فلزی عایق نیست. برخی مواد عایق، پلاستیکی‌اند.» کدام نتیجه معتبر است؟","options":["برخی پلاستیک‌ها فلز نیستند","هیچ پلاستیکی فلز نیست","همه پلاستیک‌ها عایق‌اند","برخی فلزات پلاستیکی‌اند"],"answer":0,"explanation":"برخی مواد پلاستیکی عایق‌اند و هیچ عایقی فلز نیست؛ پس همان «برخی پلاستیک‌ها» قطعاً فلز نیستند. تعمیم به «هیچ پلاستیکی» معتبر نیست."},{"subject":"درک مطلب تحلیلی","q":"«افزایش تعداد خودروها به‌تنهایی عامل آلودگی هوا نیست؛ کیفیت سوخت و فرسودگی ناوگان نیز نقش مهمی دارند.» نویسنده با این جمله چه چیزی را رد می‌کند؟","options":["نقش خودروها در آلودگی هوا","تک‌عاملی بودن علت آلودگی هوا","اهمیت کیفیت سوخت","لزوم نوسازی ناوگان"],"answer":1,"explanation":"قید «به‌تنهایی» نشان می‌دهد نویسنده تک‌عاملی دانستن علت آلودگی را رد می‌کند، نه اصل نقش خودروها را."},{"subject":"استدلال کمّی","q":"نسبت سن پدر به پسر ۷ به ۲ است. اگر مجموع سن آن‌ها ۵۴ سال باشد، پسر چند سال دارد؟","options":["۱۰","۱۲","۱۴","۱۶"],"answer":1,"explanation":"مجموع نسبت‌ها = ۹؛ هر واحد = ۵۴ ÷ ۹ = ۶؛ سن پسر = ۲ × ۶ = ۱۲ سال."},{"subject":"استدلال کمّی","q":"احتمال آنکه در دو بار پرتاب یک سکه سالم، حداقل یک «شیر» بیاید چقدر است؟","options":["۱/۲","۱/۴","۳/۴","۲/۳"],"answer":2,"explanation":"احتمال هیچ شیر (هر دو خط) = ۱/۴؛ پس حداقل یک شیر = ۱ − ۱/۴ = ۳/۴."},{"subject":"استدلال منطقی","q":"در یک استدلال، «تعمیم شتاب‌زده» زمانی رخ می‌دهد که ............","options":["از نمونه‌های اندک و غیرمعرف، نتیجه کلی گرفته شود","به جای نقد استدلال، شخصیت گوینده نقد شود","دو رویداد هم‌زمان، علت و معلول فرض شوند","از مرجع نامعتبر نقل قول شود"],"answer":0,"explanation":"مغالطه تعمیم شتاب‌زده (Hasty Generalization) یعنی نتیجه‌گیری کلی از نمونه‌های ناکافی. گزینه ۲ مغالطه حمله شخصی و گزینه ۳ مغالطه علت شمردن هم‌زمانی است."},{"subject":"استدلال کمّی","q":"مساحت مربعی که قطر آن ۸ سانتی‌متر است چند سانتی‌متر مربع است؟","options":["۱۶","۳۲","۶۴","۲۴"],"answer":1,"explanation":"مساحت مربع بر حسب قطر = d²/۲ = ۶۴ ÷ ۲ = ۳۲ سانتی‌متر مربع."},{"subject":"درک مطلب تحلیلی","q":"«اگر بودجه پژوهش افزایش نیابد، مهاجرت نخبگان ادامه خواهد یافت. بودجه پژوهش افزایش نیافته است.» نتیجه منطقی این دو مقدمه چیست؟","options":["مهاجرت نخبگان ادامه خواهد یافت","مهاجرت نخبگان متوقف می‌شود","بودجه پژوهش کافی است","نمی‌توان هیچ نتیجه‌ای گرفت"],"answer":0,"explanation":"قیاس استثنایی وضع مقدم (Modus Ponens): شرط «عدم افزایش بودجه» محقق شده، پس تالی یعنی «ادامه مهاجرت نخبگان» نتیجه می‌شود."}]}]},{"id":"computer","title":"مهندسی کامپیوتر","code":"کد ۱۲۷۶","icon":"💻","description":"ریاضیات، ساختمان داده و الگوریتم، سیستم‌عامل، معماری، نظریه زبان‌ها، پایگاه داده، شبکه و هوش مصنوعی","exams":[{"id":"cs-math","title":"ریاضیات (عمومی، گسسته، آمار)","durationMinutes":30,"subjectsLabel":"ریاضی عمومی، ریاضیات گسسته، آمار و احتمال","questions":[{"subject":"ریاضی عمومی","q":"حاصل حد lim(x→0) sin(3x)/x کدام است؟","options":["۰","۱","۳","بی‌نهایت"],"answer":2,"explanation":"طبق حد مشهور sin(u)/u → ۱، داریم sin(3x)/x = 3·sin(3x)/(3x) → ۳ × ۱ = ۳."},{"subject":"ریاضی عمومی","q":"مشتق تابع f(x) = x·ln(x) کدام است؟","options":["ln(x)","1 + ln(x)","1/x","x + ln(x)"],"answer":1,"explanation":"با قاعده ضرب: f′ = 1·ln(x) + x·(1/x) = ln(x) + 1."},{"subject":"ریاضی عمومی","q":"انتگرال ∫₀¹ 2x·eˣ² dx برابر است با:","options":["e − 1","e","e + 1","1"],"answer":0,"explanation":"با تغییر متغیر u = x²، du = 2x dx؛ انتگرال به ∫₀¹ eᵘ du = e − ۱ تبدیل می‌شود."},{"subject":"ریاضیات گسسته","q":"تعداد توابع پوشا (onto) از مجموعه ۳ عضوی به مجموعه ۲ عضوی کدام است؟","options":["۶","۸","۹","۲"],"answer":0,"explanation":"کل توابع = ۲³ = ۸؛ توابع غیرپوشا (تک‌مقداره) = ۲؛ پس توابع پوشا = ۸ − ۲ = ۶."},{"subject":"ریاضیات گسسته","q":"در یک گراف ساده همبند با n رأس، حداقل تعداد یال‌ها چقدر است؟","options":["n","n − 1","n(n−1)/2","n + 1"],"answer":1,"explanation":"کمترین یال برای همبندی، ساختار درخت است که دقیقاً n − ۱ یال دارد."},{"subject":"ریاضیات گسسته","q":"رابطه بازگشتی aₙ = 2aₙ₋₁ با a₀ = 3 چه جواب صریحی دارد؟","options":["aₙ = 3·2ⁿ","aₙ = 2·3ⁿ","aₙ = 6n","aₙ = 2ⁿ + 3"],"answer":0,"explanation":"هر جمله دو برابر قبلی است؛ دنباله هندسی با جمله اول ۳ و قدرنسبت ۲: aₙ = 3·2ⁿ."},{"subject":"ریاضیات گسسته","q":"تعداد جایگشت‌های حروف کلمه «MAMMAL» کدام است؟","options":["۷۲۰","۱۲۰","۶۰","۱۸۰"],"answer":2,"explanation":"۶ حرف با ۳ حرف M و ۲ حرف A: ‎6!/(3!·2!) = 720/12 = 60."},{"subject":"آمار و احتمال","q":"دو تاس سالم پرتاب می‌شوند. احتمال اینکه مجموع دو تاس ۷ شود چقدر است؟","options":["1/6","1/12","5/36","7/36"],"answer":0,"explanation":"حالات مطلوب: (۱,۶)(۲,۵)(۳,۴)(۴,۳)(۵,۲)(۶,۱) = ۶ حالت از ۳۶؛ احتمال = 6/36 = 1/6."},{"subject":"آمار و احتمال","q":"اگر X متغیر تصادفی با میانگین ۵ و واریانس ۴ باشد، واریانس 3X + 2 کدام است؟","options":["۱۲","۱۴","۳۶","۳۸"],"answer":2,"explanation":"Var(aX + b) = a²·Var(X) = ۹ × ۴ = ۳۶؛ جابه‌جایی ثابت (+۲) واریانس را تغییر نمی‌دهد."},{"subject":"آمار و احتمال","q":"در توزیع دوجمله‌ای با n = 100 و p = 0.2، میانگین تعداد موفقیت‌ها چقدر است؟","options":["۱۶","۲۰","۲۵","۸۰"],"answer":1,"explanation":"میانگین توزیع دوجمله‌ای = np = ۱۰۰ × ۰٫۲ = ۲۰."},{"subject":"ریاضی عمومی","q":"سری ∑ (1/n²) از n=1 تا بی‌نهایت ............","options":["واگراست","همگرا به π²/6 است","همگرا به ۱ است","همگرا به e است"],"answer":1,"explanation":"این سری p-سری با p = ۲ > ۱ است و همگراست؛ مقدار مشهور آن (مسئله بازل) برابر π²/6 است."},{"subject":"ریاضیات گسسته","q":"بنا بر اصل لانه کبوتری، در گروهی از حداقل چند نفر، مطمئناً دو نفر در یک ماه یکسان متولد شده‌اند؟","options":["۱۲","۱۳","۲۴","۲۵"],"answer":1,"explanation":"۱۲ ماه داریم؛ با ۱۳ نفر حتماً دست‌کم دو نفر در یک ماه مشترک متولد شده‌اند (اصل لانه کبوتری)."},{"subject":"ریاضی عمومی","q":"ماتریس A دو در دو با دترمینان ۵ است. دترمینان ماتریس 2A کدام است؟","options":["۱۰","۲۰","۲۵","۴۰"],"answer":1,"explanation":"det(kA) = kⁿ·det(A) برای ماتریس n×n؛ اینجا ۲² × ۵ = ۲۰."},{"subject":"آمار و احتمال","q":"اگر P(A) = 0.6، P(B) = 0.5 و P(A∩B) = 0.3 باشد، آیا A و B مستقل‌اند؟","options":["بله، چون P(A∩B) = P(A)·P(B)","خیر، چون P(A∩B) ≠ P(A)·P(B)","بله، چون P(A∪B) = 0.8","با این اطلاعات قابل تعیین نیست"],"answer":0,"explanation":"P(A)·P(B) = ۰٫۶ × ۰٫۵ = ۰٫۳ که دقیقاً برابر P(A∩B) است؛ پس دو پیشامد مستقل‌اند."},{"subject":"ریاضیات گسسته","q":"کدام گزاره با ¬(p ∧ q) هم‌ارز است؟","options":["¬p ∧ ¬q","¬p ∨ ¬q","p ∨ q","¬p → q"],"answer":1,"explanation":"قانون دمورگان: نقیض عطف، فصلِ نقیض‌هاست: ¬(p ∧ q) ≡ ¬p ∨ ¬q."}]},{"id":"cs-spec-1","title":"دروس تخصصی ۱ (ساختمان داده، الگوریتم، نظریه زبان‌ها)","durationMinutes":30,"subjectsLabel":"ساختمان داده، طراحی الگوریتم، نظریه زبان‌ها و ماشین‌ها","questions":[{"subject":"ساختمان داده","q":"پیچیدگی زمانی جستجو در درخت جستجوی دودویی متوازن (مانند AVL) با n گره کدام است؟","options":["O(1)","O(log n)","O(n)","O(n log n)"],"answer":1,"explanation":"در درخت متوازن ارتفاع O(log n) است و جستجو حداکثر به اندازه ارتفاع درخت مقایسه نیاز دارد."},{"subject":"ساختمان داده","q":"کدام پیمایش درخت جستجوی دودویی، کلیدها را به ترتیب صعودی تولید می‌کند؟","options":["Preorder","Postorder","Inorder","Level-order"],"answer":2,"explanation":"پیمایش میان‌ترتیب (Inorder) در BST ابتدا زیر‌درخت چپ (مقادیر کوچکتر)، سپس ریشه و بعد زیر‌درخت راست را می‌بیند؛ نتیجه مرتب صعودی است."},{"subject":"ساختمان داده","q":"در یک Max-Heap با n عنصر، حذف بزرگ‌ترین عنصر چه پیچیدگی زمانی دارد؟","options":["O(1)","O(log n)","O(n)","O(n log n)"],"answer":1,"explanation":"ریشه حذف می‌شود، آخرین عنصر به ریشه می‌آید و عمل heapify (فرو بردن) حداکثر به اندازه ارتفاع O(log n) هزینه دارد."},{"subject":"ساختمان داده","q":"برای پیاده‌سازی صف (Queue) با دو پشته (Stack)، هزینه سرشکن (amortized) هر عمل enqueue و dequeue کدام است؟","options":["O(1)","O(log n)","O(n)","O(n²)"],"answer":0,"explanation":"هر عنصر حداکثر دو بار push و دو بار pop می‌شود؛ بنابراین هزینه سرشکن هر عمل O(1) است."},{"subject":"طراحی الگوریتم","q":"پیچیدگی زمانی الگوریتم مرتب‌سازی ادغامی (Merge Sort) در بدترین حالت کدام است؟","options":["O(n)","O(n log n)","O(n²)","O(log n)"],"answer":1,"explanation":"رابطه بازگشتی T(n) = 2T(n/2) + O(n) طبق قضیه اصلی به O(n log n) می‌انجامد و به داده ورودی حساس نیست."},{"subject":"طراحی الگوریتم","q":"الگوریتم دایکسترا (Dijkstra) در چه شرایطی جواب نادرست می‌دهد؟","options":["وقتی گراف جهت‌دار باشد","وقتی گراف یال با وزن منفی داشته باشد","وقتی گراف دور داشته باشد","وقتی گراف ناهمبند باشد"],"answer":1,"explanation":"دایکسترا مبتنی بر انتخاب حریصانه است و با یال منفی ممکن است مسیر کوتاه‌تری بعداً پیدا شود؛ برای وزن منفی از بلمن-فورد استفاده می‌شود."},{"subject":"طراحی الگوریتم","q":"جواب رابطه بازگشتی T(n) = 2T(n/2) + n² طبق قضیه اصلی (Master Theorem) کدام است؟","options":["Θ(n²)","Θ(n log n)","Θ(n² log n)","Θ(n³)"],"answer":0,"explanation":"n^(log₂2) = n و f(n) = n² از آن بزرگ‌تر است (حالت سوم قضیه اصلی)؛ پس T(n) = Θ(n²)."},{"subject":"طراحی الگوریتم","q":"مسئله کوله‌پشتی صفر و یک (0/1 Knapsack) با برنامه‌ریزی پویا با ظرفیت W و n قلم چه پیچیدگی‌ای دارد؟","options":["O(n·W)","O(n log W)","O(2ⁿ)","O(n²)"],"answer":0,"explanation":"جدول DP با n سطر و W ستون پر می‌شود و هر خانه O(1) هزینه دارد؛ پیچیدگی شبه‌چندجمله‌ای O(n·W)."},{"subject":"طراحی الگوریتم","q":"کدام الگوریتم برای یافتن درخت پوشای کمینه (MST) به کار می‌رود؟","options":["دایکسترا","کروسکال","فلوید-وارشال","بلمن-فورد"],"answer":1,"explanation":"کروسکال (و همچنین پریم) الگوریتم‌های حریصانه یافتن MST هستند؛ بقیه گزینه‌ها برای کوتاه‌ترین مسیرند."},{"subject":"نظریه زبان‌ها","q":"زبان L = {aⁿbⁿ | n ≥ 0} در کدام کلاس از زبان‌ها قرار دارد؟","options":["منظم (Regular)","مستقل از متن ولی غیرمنظم","حساس به متن ولی غیرمستقل از متن","بازگشتی شمارش‌پذیر ولی غیربازگشتی"],"answer":1,"explanation":"با لم تزریق (Pumping Lemma) ثابت می‌شود منظم نیست، اما گرامر مستقل از متن S → aSb | ε آن را تولید می‌کند."},{"subject":"نظریه زبان‌ها","q":"کدام ماشین برای پذیرش زبان‌های مستقل از متن (CFL) کافی است؟","options":["اتوماتای متناهی قطعی (DFA)","اتوماتای پشته‌ای (PDA)","ماشین تورینگ با نوار محدود","اتوماتای متناهی غیرقطعی (NFA)"],"answer":1,"explanation":"زبان‌های مستقل از متن دقیقاً توسط اتوماتای پشته‌ای غیرقطعی (NPDA) پذیرفته می‌شوند؛ DFA/NFA فقط زبان‌های منظم را می‌پذیرند."},{"subject":"نظریه زبان‌ها","q":"کلاس زبان‌های منظم تحت کدام عمل «بسته نیست»؟","options":["اجتماع","مکمل","الحاق","هیچ‌کدام — تحت هر سه بسته است"],"answer":3,"explanation":"زبان‌های منظم تحت اجتماع، اشتراک، مکمل، الحاق، ستاره کلینی و معکوس همگی بسته‌اند."},{"subject":"نظریه زبان‌ها","q":"مسئله توقف (Halting Problem) چه وضعیتی دارد؟","options":["تصمیم‌پذیر است","تصمیم‌ناپذیر ولی نیمه‌تصمیم‌پذیر است","نه تصمیم‌پذیر است نه نیمه‌تصمیم‌پذیر","فقط برای ماشین‌های قطعی تصمیم‌پذیر است"],"answer":1,"explanation":"تورینگ ثابت کرد مسئله توقف تصمیم‌ناپذیر است، اما با شبیه‌سازی می‌توان توقف را در صورت رخ دادن تشخیص داد؛ پس بازگشتی شمارش‌پذیر (نیمه‌تصمیم‌پذیر) است."},{"subject":"ساختمان داده","q":"در جدول درهم‌سازی (Hash Table) با آدرس‌دهی باز و ضریب بار α، متوسط تعداد کاوش در جستجوی ناموفق حدوداً کدام است؟","options":["1/(1−α)","1/α","α","log(1/α)"],"answer":0,"explanation":"در آدرس‌دهی باز با درهم‌سازی یکنواخت، متوسط کاوش‌های جستجوی ناموفق حداکثر 1/(1−α) است."},{"subject":"طراحی الگوریتم","q":"اگر مسئله‌ای NP-Complete در زمان چندجمله‌ای حل شود، کدام نتیجه حاصل می‌شود؟","options":["P = NP","P ≠ NP","NP = EXP","هیچ نتیجه‌ای درباره P و NP نمی‌دهد"],"answer":0,"explanation":"همه مسائل NP به مسائل NP-Complete کاهش چندجمله‌ای دارند؛ حل چندجمله‌ای یکی از آن‌ها یعنی حل چندجمله‌ای همه NP، یعنی P = NP."}]},{"id":"cs-spec-2","title":"دروس تخصصی ۲ (سیستم‌عامل، معماری، شبکه، پایگاه داده، هوش)","durationMinutes":30,"subjectsLabel":"سیستم‌عامل، معماری کامپیوتر، شبکه، پایگاه داده، هوش مصنوعی","questions":[{"subject":"سیستم‌عامل","q":"کدام‌یک از شرایط چهارگانه بروز بن‌بست (Deadlock) نیست؟","options":["انحصار متقابل (Mutual Exclusion)","نگه‌داشتن و انتظار (Hold and Wait)","قبضه‌کردن منابع (Preemption)","انتظار چرخشی (Circular Wait)"],"answer":2,"explanation":"شرط لازم بن‌بست «عدم قبضه» (No Preemption) است، نه قبضه‌کردن. اگر منابع قابل پس‌گرفتن باشند بن‌بست شکل نمی‌گیرد."},{"subject":"سیستم‌عامل","q":"در زمان‌بندی CPU، الگوریتم SJF (کوتاه‌ترین کار اول) چه ویژگی‌ای دارد؟","options":["میانگین زمان انتظار را کمینه می‌کند ولی ممکن است قحطی ایجاد کند","همیشه عادلانه است و قحطی ندارد","برای سیستم‌های بلادرنگ طراحی شده است","زمان پاسخ را برای همه فرایندها برابر می‌کند"],"answer":0,"explanation":"SJF از نظر میانگین زمان انتظار بهینه است، اما فرایندهای طولانی ممکن است دچار قحطی (Starvation) شوند."},{"subject":"سیستم‌عامل","q":"در مدیریت حافظه با صفحه‌بندی، «شکست صفحه» (Page Fault) زمانی رخ می‌دهد که ............","options":["صفحه مورد نیاز در حافظه اصلی نباشد","جدول صفحات پر شود","TLB خالی باشد","قطعه‌بندی خارجی رخ دهد"],"answer":0,"explanation":"Page Fault یعنی صفحه ارجاع‌شده در حافظه فیزیکی حاضر نیست و باید از دیسک بارگذاری شود. TLB miss فقط جستجوی جدول صفحات را کند می‌کند."},{"subject":"سیستم‌عامل","q":"سمافور (Semaphore) دودویی مقداردهی‌شده با ۱، معادل کدام سازوکار است؟","options":["مانیتور","قفل انحصاری (Mutex)","پیام‌رسانی","وقفه"],"answer":1,"explanation":"سمافور دودویی با مقدار اولیه ۱ دقیقاً رفتار قفل انحصاری دارد: فقط یک فرایند وارد ناحیه بحرانی می‌شود."},{"subject":"معماری کامپیوتر","q":"در سلسله‌مراتب حافظه، اگر نرخ اصابت کش ۹۰٪، زمان دسترسی کش ۱۰ns و زمان دسترسی حافظه اصلی ۱۰۰ns باشد، متوسط زمان دسترسی (با کش پیش‌بازرس) چقدر است؟","options":["۱۹ ns","۲۰ ns","۲۸ ns","۵۵ ns"],"answer":0,"explanation":"AMAT = ۱۰ + ۰٫۱ × ۹۰ = ۱۹ns (زمان کش + نرخ خطا × جریمه خطا؛ جریمه = ۱۰۰ − ۱۰ = ۹۰)."},{"subject":"معماری کامپیوتر","q":"در خط لوله (Pipeline) پنج مرحله‌ای، مخاطره داده (Data Hazard) با کدام تکنیک کاهش می‌یابد؟","options":["پیش‌بینی پرش","میان‌گذر (Forwarding)","افزایش عمق خط لوله","کش دستورالعمل"],"answer":1,"explanation":"Forwarding/Bypassing نتیجه محاسبه‌شده را قبل از نوشتن در ثبات مستقیماً به مرحله نیازمند می‌رساند و توقف‌های ناشی از وابستگی داده را کم می‌کند."},{"subject":"معماری کامپیوتر","q":"عدد ۱۰- (منفی ده) در مبنای دو با روش مکمل ۲ و ۸ بیت چگونه نمایش داده می‌شود؟","options":["11110110","10001010","11110101","00001010"],"answer":0,"explanation":"‎+10 = 00001010؛ مکمل یک = 11110101؛ با افزودن ۱، مکمل دو = 11110110."},{"subject":"شبکه","q":"پروتکل TCP در کدام لایه از مدل OSI قرار دارد و چه نوع سرویسی ارائه می‌کند؟","options":["لایه شبکه — بدون اتصال","لایه انتقال — اتصال‌گرا و قابل اطمینان","لایه انتقال — بدون اتصال و غیرقابل اطمینان","لایه نشست — اتصال‌گرا"],"answer":1,"explanation":"TCP پروتکل لایه انتقال (لایه ۴) است؛ اتصال‌گرا با دست‌تکانی سه‌مرحله‌ای و تحویل مطمئن و مرتب داده."},{"subject":"شبکه","q":"یک شبکه با آدرس 192.168.1.0/26 حداکثر چند میزبان (Host) قابل استفاده دارد؟","options":["۶۴","۶۲","۳۰","۱۲۶"],"answer":1,"explanation":"‎/26 یعنی ۶ بیت میزبان: ۲⁶ = ۶۴ آدرس، منهای آدرس شبکه و همه‌پخشی: ۶۲ میزبان."},{"subject":"شبکه","q":"وظیفه پروتکل DNS چیست؟","options":["تبدیل نام دامنه به آدرس IP","مسیریابی بسته‌ها بین شبکه‌ها","رمزنگاری ترافیک وب","تخصیص پویا آدرس IP به میزبان‌ها"],"answer":0,"explanation":"DNS سامانه نام دامنه است و نام‌هایی مانند example.com را به آدرس IP تبدیل می‌کند. تخصیص پویا IP کار DHCP است."},{"subject":"پایگاه داده","q":"رابطه‌ای در فرم نرمال سوم (3NF) است هرگاه ............","options":["هیچ وابستگی تابعی جزئی و هیچ وابستگی تابعی تراگذری از کلید نامزد به صفت غیرکلیدی نداشته باشد","فقط وابستگی جزئی نداشته باشد","هر دترمینان آن کلید نامزد باشد","هیچ صفت چندمقداری نداشته باشد"],"answer":0,"explanation":"3NF یعنی رابطه در 2NF باشد (بدون وابستگی جزئی) و وابستگی تراگذری صفات غیرکلیدی به کلید هم نداشته باشد. گزینه ۳ تعریف BCNF و گزینه ۴ شرط 1NF است."},{"subject":"پایگاه داده","q":"در SQL کدام دستور برای حذف کامل ساختار جدول به کار می‌رود؟","options":["DELETE","TRUNCATE","DROP TABLE","REMOVE"],"answer":2,"explanation":"DROP TABLE ساختار و داده را با هم حذف می‌کند؛ DELETE و TRUNCATE فقط سطرها را پاک می‌کنند و جدول باقی می‌ماند."},{"subject":"پایگاه داده","q":"خاصیت «جداپذیری» (Isolation) در تراکنش‌ها یعنی چه؟","options":["اجرای هم‌زمان تراکنش‌ها نتیجه‌ای معادل اجرای ترتیبی داشته باشد","تراکنش یا کامل اجرا شود یا اصلاً اجرا نشود","نتایج تراکنش تأییدشده هرگز از بین نرود","پایگاه از حالت سازگار به حالت سازگار برود"],"answer":0,"explanation":"Isolation از خواص ACID است: تراکنش‌های هم‌زمان نباید در میانه کار همدیگر را ببینند. گزینه ۲ Atomicity، گزینه ۳ Durability و گزینه ۴ Consistency است."},{"subject":"هوش مصنوعی","q":"الگوریتم جستجوی A* در چه صورتی بهینه (Optimal) است؟","options":["وقتی تابع مکاشفه‌ای h هرگز هزینه واقعی را بیش‌برآورد نکند (admissible باشد)","وقتی h همیشه صفر باشد","وقتی گراف بدون دور باشد","در هر شرایطی بهینه است"],"answer":0,"explanation":"شرط بهینگی A* در جستجوی درختی، admissible بودن h است (h(n) ≤ هزینه واقعی تا هدف). با h = 0 الگوریتم به جستجوی هزینه یکنواخت تبدیل می‌شود که بهینه ولی کندتر است."},{"subject":"هوش مصنوعی","q":"در بازی دو نفره با اطلاعات کامل، هرس آلفا-بتا چه تأثیری بر نتیجه Minimax دارد؟","options":["نتیجه را تغییر نمی‌دهد، فقط گره‌های کمتری بررسی می‌شوند","نتیجه را تقریبی می‌کند","فقط در برگ‌ها صرفه‌جویی می‌کند","عمق جستجو را کاهش می‌دهد"],"answer":0,"explanation":"هرس آلفا-بتا شاخه‌هایی را که قطعاً بر تصمیم نهایی اثر ندارند حذف می‌کند؛ خروجی دقیقاً همان Minimax است با محاسبه کمتر."}]},{"id":"cs-jame","title":"آزمون جامع مهندسی کامپیوتر","durationMinutes":40,"subjectsLabel":"همه دروس — شبیه‌ساز کنکور","questions":[{"subject":"ساختمان داده","q":"تعداد درخت‌های دودویی متمایز با ۳ گره کدام است؟","options":["۳","۵","۶","۹"],"answer":1,"explanation":"تعداد درخت‌های دودویی با n گره برابر عدد کاتالان Cₙ است؛ C₃ = 5."},{"subject":"طراحی الگوریتم","q":"در جستجوی دودویی روی آرایه مرتب با ۱۰۲۴ عنصر، حداکثر چند مقایسه لازم است؟","options":["۹","۱۰","۱۱","۳۲"],"answer":2,"explanation":"حداکثر مقایسه‌ها ⌊log₂(n)⌋ + 1 = ۱۰ + ۱ = ۱۱ است (۱۰۲۴ = ۲¹⁰)."},{"subject":"سیستم‌عامل","q":"الگوریتم جایگزینی صفحه LRU کدام صفحه را بیرون می‌اندازد؟","options":["صفحه‌ای که زودتر از همه وارد شده","صفحه‌ای که دیرتر از همه استفاده شده","صفحه‌ای که مدت طولانی‌تری استفاده نشده","صفحه‌ای که کمترین دفعات استفاده را داشته"],"answer":2,"explanation":"LRU (Least Recently Used) صفحه‌ای را حذف می‌کند که از آخرین استفاده‌اش بیشترین زمان گذشته است. گزینه ۱ FIFO و گزینه ۴ LFU است."},{"subject":"معماری کامپیوتر","q":"کش با نگاشت مستقیم (Direct-Mapped) ۶۴ خط دارد و اندازه هر بلاک ۱۶ بایت است. آدرس ۳۲ بیتی چند بیت تگ (Tag) دارد؟","options":["۲۲","۲۴","۲۶","۲۰"],"answer":0,"explanation":"بیت‌های آفست = log₂16 = ۴؛ بیت‌های اندیس = log₂64 = ۶؛ تگ = ۳۲ − ۴ − ۶ = ۲۲ بیت."},{"subject":"نظریه زبان‌ها","q":"حداقل تعداد حالات DFA برای پذیرش زبان «رشته‌های دودویی که بر ۳ بخش‌پذیرند» کدام است؟","options":["۲","۳","۴","۶"],"answer":1,"explanation":"کافی است باقیمانده تقسیم عدد بر ۳ را نگه داریم: سه حالت برای باقیمانده‌های ۰، ۱ و ۲؛ حالت باقیمانده ۰ پذیرنده است."},{"subject":"شبکه","q":"در دست‌تکانی سه‌مرحله‌ای TCP، ترتیب پرچم‌ها کدام است؟","options":["SYN، SYN-ACK، ACK","ACK، SYN، FIN","SYN، ACK، FIN","SYN، RST، ACK"],"answer":0,"explanation":"کلاینت SYN می‌فرستد، سرور با SYN-ACK پاسخ می‌دهد و کلاینت با ACK اتصال را برقرار می‌کند."},{"subject":"پایگاه داده","q":"نتیجه پرس‌وجوی SELECT COUNT(*) FROM T WHERE X IS NULL چیست؟","options":["تعداد سطرهایی که X آن‌ها NULL است","همیشه صفر، چون NULL با هیچ‌چیز برابر نیست","خطای نحوی دارد","تعداد کل سطرهای جدول"],"answer":0,"explanation":"شرط IS NULL روش صحیح آزمون NULL بودن است (برخلاف = NULL که همیشه UNKNOWN می‌شود) و سطرهای دارای X تهی را می‌شمارد."},{"subject":"هوش مصنوعی","q":"جستجوی عمق‌اول (DFS) نسبت به جستجوی سطح‌اول (BFS) چه مزیتی دارد؟","options":["همیشه کوتاه‌ترین مسیر را می‌یابد","مصرف حافظه بسیار کمتری دارد","همیشه کامل است","همیشه سریع‌تر به جواب می‌رسد"],"answer":1,"explanation":"حافظه DFS خطی برحسب عمق O(bm) است در حالی که BFS حافظه نمایی O(b^d) نیاز دارد. در عوض DFS نه کامل است نه بهینه."},{"subject":"ریاضیات گسسته","q":"گراف کامل K₅ چند یال دارد؟","options":["۵","۱۰","۱۵","۲۰"],"answer":1,"explanation":"گراف کامل با n رأس n(n−1)/2 یال دارد: ۵ × ۴ ÷ ۲ = ۱۰."},{"subject":"سیستم‌عامل","q":"تفاوت اصلی نخ (Thread) و فرایند (Process) چیست؟","options":["نخ‌های یک فرایند فضای آدرس مشترک دارند ولی فرایندها جدا هستند","نخ‌ها فقط در هسته اجرا می‌شوند","فرایندها پشته مشترک دارند","نخ‌ها قابل زمان‌بندی نیستند"],"answer":0,"explanation":"نخ‌های یک فرایند حافظه (کد، داده، heap) را به اشتراک می‌گذارند و فقط پشته و ثبات‌های خود را دارند؛ فرایندها فضای آدرس مستقل دارند."},{"subject":"طراحی الگوریتم","q":"کدام روش طراحی الگوریتم برای «زیرمسئله‌های هم‌پوشان با زیرساختار بهینه» مناسب‌تر است؟","options":["تقسیم و حل","برنامه‌ریزی پویا","حریصانه","عقب‌گرد"],"answer":1,"explanation":"برنامه‌ریزی پویا نتایج زیرمسئله‌های تکراری را ذخیره می‌کند (memoization) و برای زیرمسئله‌های هم‌پوشان با زیرساختار بهینه طراحی شده است."},{"subject":"معماری کامپیوتر","q":"طبق قانون امدال (Amdahl)، اگر ۴۰٪ برنامه ۲ برابر سریع شود، شتاب کلی چقدر است؟","options":["۱٫۲۵","۱٫۶۷","۲","۱٫۴۳"],"answer":0,"explanation":"شتاب = 1 / (0.6 + 0.4/2) = 1 / 0.8 = ۱٫۲۵."},{"subject":"شبکه","q":"کدام دستگاه در لایه دوم (پیوند داده) کار می‌کند و بر اساس آدرس MAC فریم‌ها را هدایت می‌کند؟","options":["هاب","روتر","سوئیچ","تکرارکننده"],"answer":2,"explanation":"سوئیچ جدول MAC نگه می‌دارد و فریم را فقط به درگاه مقصد می‌فرستد. روتر لایه ۳ و هاب/تکرارکننده لایه ۱ هستند."},{"subject":"پایگاه داده","q":"در جبر رابطه‌ای، عملگر ⋈ (پیوند طبیعی) چه می‌کند؟","options":["سطرهای دو رابطه را بر اساس تساوی صفات هم‌نام ترکیب می‌کند","اجتماع دو رابطه را برمی‌گرداند","ستون‌های تکراری تولید می‌کند","فقط سطرهای ناسازگار را برمی‌گرداند"],"answer":0,"explanation":"پیوند طبیعی، ضرب دکارتی به‌همراه شرط تساوی صفات هم‌نام و حذف ستون تکراری است."},{"subject":"هوش مصنوعی","q":"در یادگیری ماشین، «بیش‌برازش» (Overfitting) یعنی چه؟","options":["مدل روی داده آموزش عالی ولی روی داده جدید ضعیف عمل می‌کند","مدل نه داده آموزش را یاد می‌گیرد نه تعمیم می‌دهد","مدل بیش از حد ساده است","داده آموزش بیش از حد بزرگ است"],"answer":0,"explanation":"بیش‌برازش یعنی مدل نویز داده آموزش را حفظ کرده و قدرت تعمیم به داده دیده‌نشده را از دست داده است. گزینه ۳ توصیف Underfitting است."},{"subject":"آمار و احتمال","q":"طبق قضیه بیز، اگر P(B|A) = 0.8، P(A) = 0.3 و P(B) = 0.6 باشد، P(A|B) چقدر است؟","options":["۰٫۲۴","۰٫۴","۰٫۴۸","۰٫۵"],"answer":1,"explanation":"P(A|B) = P(B|A)·P(A)/P(B) = (۰٫۸ × ۰٫۳) ÷ ۰٫۶ = ۰٫۲۴ ÷ ۰٫۶ = ۰٫۴."},{"subject":"نظریه زبان‌ها","q":"عبارت منظم (a|b)*abb چه رشته‌هایی را توصیف می‌کند؟","options":["رشته‌هایی از a و b که به abb ختم می‌شوند","رشته‌هایی که با abb شروع می‌شوند","رشته‌هایی که شامل abb نیستند","فقط رشته abb"],"answer":0,"explanation":"(a|b)* هر پیشوندی از a و b را می‌پذیرد و سپس رشته باید دقیقاً با abb تمام شود."},{"subject":"سیستم‌عامل","q":"الگوریتم بانکدار (Banker's Algorithm) برای چه منظوری استفاده می‌شود؟","options":["اجتناب از بن‌بست","تشخیص بن‌بست پس از وقوع","زمان‌بندی دیسک","مدیریت حافظه مجازی"],"answer":0,"explanation":"الگوریتم بانکدار قبل از تخصیص منبع بررسی می‌کند که آیا سیستم در حالت امن باقی می‌ماند یا نه — روش اجتناب از بن‌بست (Deadlock Avoidance)."},{"subject":"ریاضی عمومی","q":"نقطه بحرانی تابع f(x) = x³ − 3x در کدام گزینه است و چه نوعی دارد؟","options":["x = 1 کمینه نسبی و x = −1 بیشینه نسبی","x = 1 بیشینه نسبی و x = −1 کمینه نسبی","x = 0 نقطه عطف و تنها نقطه بحرانی","تابع نقطه بحرانی ندارد"],"answer":0,"explanation":"f′ = 3x² − 3 = 0 ⟵ x = ±۱؛ با f″ = 6x: در x = ۱ مثبت (کمینه) و در x = −۱ منفی (بیشینه)."},{"subject":"شبکه","q":"HTTPS از کدام پروتکل برای رمزنگاری استفاده می‌کند و روی کدام پورت پیش‌فرض کار می‌کند؟","options":["TLS — پورت ۴۴۳","SSH — پورت ۲۲","IPSec — پورت ۸۰","TLS — پورت ۸۰۸۰"],"answer":0,"explanation":"HTTPS همان HTTP روی TLS (جانشین SSL) است و پورت پیش‌فرض آن ۴۴۳ است."}]}]},{"id":"management","title":"مدیریت","code":"کد ۱۱۴۲","icon":"📊","description":"تئوری‌های مدیریت، اقتصاد خرد و کلان، بازاریابی، مالی و منابع انسانی","exams":[{"id":"mgmt-1","title":"تئوری‌های مدیریت و اقتصاد","durationMinutes":25,"subjectsLabel":"تئوری‌های مدیریت، اقتصاد خرد و کلان","questions":[{"subject":"تئوری‌های مدیریت","q":"کدام‌یک از وظایف مدیریت از دیدگاه هنری فایول نیست؟","options":["برنامه‌ریزی","سازماندهی","بازاریابی","کنترل"],"answer":2,"explanation":"وظایف پنج‌گانه فایول: برنامه‌ریزی، سازماندهی، فرماندهی، هماهنگی و کنترل. بازاریابی جزء وظایف عمومی مدیریت فایول نیست."},{"subject":"تئوری‌های مدیریت","q":"نظریه مدیریت علمی به کدام دانشمند نسبت داده می‌شود؟","options":["ماکس وبر","فردریک تیلور","التون مایو","هنری فایول"],"answer":1,"explanation":"فردریک وینسلو تیلور بنیان‌گذار مدیریت علمی است (مطالعه زمان و حرکت، استانداردسازی کار). وبر بوروکراسی و مایو نهضت روابط انسانی را بنا نهاد."},{"subject":"تئوری‌های مدیریت","q":"مطالعات هاثورن (Hawthorne) سرآغاز کدام مکتب مدیریتی بود؟","options":["مدیریت علمی","روابط انسانی","مدیریت کمّی","نظریه اقتضایی"],"answer":1,"explanation":"مطالعات هاثورن توسط التون مایو نشان داد عوامل اجتماعی و روانی بر بهره‌وری اثر دارند و مکتب روابط انسانی شکل گرفت."},{"subject":"تئوری‌های مدیریت","q":"در سلسله‌مراتب نیازهای مازلو، بالاترین سطح نیاز کدام است؟","options":["احترام","تعلق و عشق","خودشکوفایی","امنیت"],"answer":2,"explanation":"ترتیب هرم مازلو از پایین به بالا: فیزیولوژیک، امنیت، تعلق، احترام و در رأس، خودشکوفایی (Self-Actualization)."},{"subject":"تئوری‌های مدیریت","q":"طبق نظریه دو عاملی هرزبرگ، «حقوق و دستمزد» جزء کدام دسته است؟","options":["عوامل انگیزشی","عوامل بهداشتی","عوامل خودشکوفایی","عوامل رشد"],"answer":1,"explanation":"هرزبرگ حقوق، شرایط کار و روابط را «عوامل بهداشتی» می‌داند که نبودشان نارضایتی می‌آورد اما وجودشان لزوماً انگیزه ایجاد نمی‌کند؛ انگیزاننده‌ها مواردی مانند موفقیت و قدردانی‌اند."},{"subject":"تئوری‌های مدیریت","q":"«وحدت فرماندهی» یعنی چه؟","options":["هر کارمند فقط از یک مافوق دستور بگیرد","همه تصمیم‌ها در رأس سازمان گرفته شود","فرماندهی و برنامه‌ریزی یکی شود","هر مدیر فقط یک زیردست داشته باشد"],"answer":0,"explanation":"اصل وحدت فرماندهی فایول: هر کارمند باید تنها از یک رئیس دستور بگیرد تا از تعارض دستورها جلوگیری شود."},{"subject":"اقتصاد خرد","q":"اگر کشش قیمتی تقاضای کالایی برابر ۲- باشد، افزایش ۱۰٪ قیمت چه اثری بر مقدار تقاضا دارد؟","options":["۲۰٪ کاهش","۱۰٪ کاهش","۵٪ کاهش","۲۰٪ افزایش"],"answer":0,"explanation":"کشش = درصد تغییر مقدار ÷ درصد تغییر قیمت؛ پس تغییر مقدار = ۲- × ۱۰٪ = ۲۰٪ کاهش. تقاضا کشسان است."},{"subject":"اقتصاد خرد","q":"در بازار رقابت کامل، بنگاه در بلندمدت در چه نقطه‌ای تولید می‌کند؟","options":["حداقل هزینه متوسط بلندمدت (P = min LAC)","حداکثر درآمد کل","جایی که هزینه نهایی حداکثر است","P بالاتر از هزینه متوسط"],"answer":0,"explanation":"ورود و خروج آزاد بنگاه‌ها سود اقتصادی را صفر می‌کند و تعادل بلندمدت در حداقل منحنی هزینه متوسط بلندمدت شکل می‌گیرد (P = MC = min LAC)."},{"subject":"اقتصاد خرد","q":"کالای گیفن (Giffen) چه ویژگی‌ای دارد؟","options":["با افزایش قیمت، مقدار تقاضایش افزایش می‌یابد","با افزایش درآمد، تقاضایش کاهش می‌یابد ولی قانون تقاضا برقرار است","کشش قیمتی آن صفر است","کالای لوکس با کشش بالاست"],"answer":0,"explanation":"کالای گیفن استثنای قانون تقاضاست: اثر درآمدی منفی چنان قوی است که با گران شدن کالا، مصرف آن بیشتر می‌شود (کالای پست خاص)."},{"subject":"اقتصاد کلان","q":"تورم ناشی از فشار تقاضا زمانی رخ می‌دهد که ............","options":["تقاضای کل از عرضه کل در اشتغال کامل پیشی بگیرد","هزینه‌های تولید افزایش یابد","قیمت نفت جهانی بالا رود","دستمزدها به‌طور دستوری کاهش یابد"],"answer":0,"explanation":"تورم تقاضا (Demand-Pull) نتیجه فزونی تقاضای کل بر ظرفیت تولید است؛ افزایش هزینه تولید، تورم فشار هزینه (Cost-Push) ایجاد می‌کند."},{"subject":"اقتصاد کلان","q":"کدام‌یک از ابزارهای سیاست پولی انقباضی است؟","options":["افزایش نرخ ذخیره قانونی","خرید اوراق قرضه توسط بانک مرکزی","کاهش نرخ تنزیل مجدد","افزایش مخارج دولت"],"answer":0,"explanation":"افزایش نرخ ذخیره قانونی قدرت وام‌دهی بانک‌ها و حجم پول را کم می‌کند (انقباضی). خرید اوراق و کاهش نرخ تنزیل انبساطی‌اند و مخارج دولت سیاست مالی است."},{"subject":"اقتصاد کلان","q":"اگر میل نهایی به مصرف (MPC) برابر ۰٫۸ باشد، ضریب فزاینده مخارج ساده چقدر است؟","options":["۱٫۲۵","۴","۵","۸"],"answer":2,"explanation":"ضریب فزاینده = 1/(1−MPC) = 1/0.2 = ۵."},{"subject":"تئوری‌های مدیریت","q":"نظریه اقتضایی (Contingency) در مدیریت چه می‌گوید؟","options":["بهترین روش مدیریت به شرایط و موقعیت بستگی دارد","همیشه یک بهترین روش جهانی وجود دارد","ساختار سازمان باید همیشه مسطح باشد","کارکنان ذاتاً از کار بیزارند"],"answer":0,"explanation":"رویکرد اقتضایی می‌گوید هیچ نسخه واحدی برای همه سازمان‌ها وجود ندارد و شیوه مناسب تابع محیط، فناوری و اندازه سازمان است."},{"subject":"تئوری‌های مدیریت","q":"در نظریه X و Y مک‌گرگور، مفروضات نظریه Y کدام است؟","options":["کارکنان کار را طبیعی می‌دانند و خودکنترل‌اند","کارکنان ذاتاً تنبل‌اند و باید کنترل شوند","کارکنان فقط با پول انگیزه می‌گیرند","کارکنان از پذیرش مسئولیت می‌گریزند"],"answer":0,"explanation":"نظریه Y نگاه مثبت دارد: کار مانند بازی طبیعی است، افراد مسئولیت‌پذیرند و خودهدایتی دارند. گزینه‌های دیگر مفروضات نظریه X هستند."},{"subject":"اقتصاد خرد","q":"هزینه فرصت یک انتخاب چیست؟","options":["ارزش بهترین گزینه از دست رفته","مجموع همه هزینه‌های پولی","هزینه ثابت تولید","مالیات پرداختی بر انتخاب"],"answer":0,"explanation":"هزینه فرصت، ارزش بهترین جایگزینی است که به خاطر انتخاب فعلی از آن صرف‌نظر شده — مفهوم بنیادین اقتصاد."}]},{"id":"mgmt-2","title":"بازاریابی، مالی و منابع انسانی","durationMinutes":25,"subjectsLabel":"بازاریابی، مدیریت مالی، منابع انسانی، رفتار سازمانی","questions":[{"subject":"بازاریابی","q":"آمیخته بازاریابی (4P) کاتلر شامل کدام عناصر است؟","options":["محصول، قیمت، توزیع، ترویج","محصول، برنامه‌ریزی، قدرت، مردم","قیمت، تبلیغ، بسته‌بندی، موقعیت","محصول، فرایند، مردم، شواهد فیزیکی"],"answer":0,"explanation":"4P کلاسیک: Product (محصول)، Price (قیمت)، Place (توزیع) و Promotion (ترویج). گزینه ۴ عناصر مکمل 7P خدمات است."},{"subject":"بازاریابی","q":"بخش‌بندی بازار (Segmentation) یعنی چه؟","options":["تقسیم بازار به گروه‌های همگن از مشتریان با نیازهای مشابه","انتخاب قیمت برای هر محصول","تعیین شعار تبلیغاتی برند","حذف رقبا از بازار"],"answer":0,"explanation":"در فرایند STP، ابتدا بازار به بخش‌های همگن تقسیم (Segmentation)، سپس بازار هدف انتخاب (Targeting) و جایگاه‌یابی (Positioning) انجام می‌شود."},{"subject":"بازاریابی","q":"در ماتریس BCG، محصولی با سهم بازار بالا در بازاری با رشد کم چه نامیده می‌شود؟","options":["ستاره","گاو شیرده","علامت سؤال","سگ"],"answer":1,"explanation":"گاو شیرده (Cash Cow): سهم بالا در بازار کم‌رشد؛ جریان نقدی قوی تولید می‌کند. ستاره سهم و رشد بالا، سگ هر دو پایین."},{"subject":"مدیریت مالی","q":"ارزش فعلی ۱۲۱۰ تومان دریافتی دو سال بعد با نرخ تنزیل ۱۰٪ چقدر است؟","options":["۱۰۰۰ تومان","۱۱۰۰ تومان","۹۰۰ تومان","۱۲۱۰ تومان"],"answer":0,"explanation":"PV = 1210 ÷ (1.1)² = 1210 ÷ 1.21 = ۱۰۰۰ تومان."},{"subject":"مدیریت مالی","q":"اگر NPV یک طرح سرمایه‌گذاری مثبت باشد، به این معناست که ............","options":["نرخ بازده طرح از نرخ تنزیل (هزینه سرمایه) بیشتر است","طرح حتماً زیان‌ده است","دوره بازگشت سرمایه طولانی است","نرخ بازده داخلی صفر است"],"answer":0,"explanation":"NPV مثبت یعنی ارزش فعلی جریان‌های ورودی از خروجی بیشتر است و IRR بزرگ‌تر از نرخ تنزیل است؛ طرح پذیرفتنی است."},{"subject":"مدیریت مالی","q":"ریسک سیستماتیک چه نوع ریسکی است؟","options":["ریسک کل بازار که با تنوع‌بخشی حذف نمی‌شود","ریسک خاص شرکت که با تنوع‌بخشی حذف می‌شود","ریسک ورشکستگی یک صنعت خاص","ریسک عملیاتی مدیران"],"answer":0,"explanation":"ریسک سیستماتیک (بازار) از عوامل کلان مانند تورم و نرخ بهره ناشی می‌شود و متنوع‌سازی پرتفوی آن را از بین نمی‌برد؛ معیار آن بتا (β) است."},{"subject":"منابع انسانی","q":"تجزیه و تحلیل شغل (Job Analysis) مبنای کدام فعالیت‌هاست؟","options":["شرح شغل و شرایط احراز","فقط تعیین حقوق","فقط ارزیابی عملکرد","تبلیغات استخدامی"],"answer":0,"explanation":"خروجی تجزیه شغل، «شرح شغل» (وظایف) و «شرایط احراز» (مهارت‌ها) است که مبنای جذب، آموزش، ارزیابی و جبران خدمات قرار می‌گیرد."},{"subject":"منابع انسانی","q":"خطای هاله‌ای (Halo Effect) در ارزیابی عملکرد یعنی ............","options":["تعمیم یک ویژگی مثبت یا منفی به کل ارزیابی فرد","ارزیابی همه کارکنان در حد متوسط","سخت‌گیری بیش از حد ارزیاب","تأثیر رویدادهای اخیر بر ارزیابی"],"answer":0,"explanation":"در خطای هاله‌ای، یک بُعد برجسته (مثبت یا منفی) قضاوت ارزیاب درباره سایر ابعاد را تحت تأثیر قرار می‌دهد. گزینه ۲ خطای گرایش مرکزی و گزینه ۴ خطای تازگی است."},{"subject":"رفتار سازمانی","q":"طبق نظریه برابری آدامز، کارمندی که احساس بی‌عدالتی می‌کند احتمالاً ............","options":["تلاش خود را متناسب با ادراکش تغییر می‌دهد","همیشه استعفا می‌دهد","بهره‌وری‌اش حتماً بالا می‌رود","هیچ واکنشی نشان نمی‌دهد"],"answer":0,"explanation":"نظریه برابری: فرد نسبت داده/ستانده خود را با دیگران مقایسه می‌کند و در صورت نابرابری، ورودی (تلاش) یا ادراک خود را تعدیل می‌کند."},{"subject":"رفتار سازمانی","q":"در نظریه انتظار وروم، انگیزش حاصل‌ضرب کدام سه عامل است؟","options":["انتظار × وسیله × ارزش (جذابیت)","نیاز × هدف × پاداش","توانایی × فرصت × تلاش","رضایت × تعهد × وفاداری"],"answer":0,"explanation":"M = E × I × V: انتظار (تلاش به عملکرد)، وسیله‌بودن (عملکرد به پاداش) و ارزش پاداش. اگر هر عامل صفر باشد انگیزش صفر است."},{"subject":"بازاریابی","q":"بازاریابی ویروسی (Viral Marketing) به چه معناست؟","options":["انتشار پیام توسط خود مشتریان به‌صورت زنجیره‌ای","تبلیغات تلویزیونی پرتکرار","فروش مستقیم خانه‌به‌خانه","تخفیف‌های فصلی گسترده"],"answer":0,"explanation":"در بازاریابی ویروسی، پیام آن‌قدر جذاب است که کاربران خودشان آن را (اغلب در فضای مجازی) دست‌به‌دست می‌کنند؛ مانند انتشار ویروس."},{"subject":"مدیریت مالی","q":"نقطه سربه‌سر فروش شرکتی با هزینه ثابت ۲۰۰ میلیون، قیمت واحد ۵۰ هزار و هزینه متغیر واحد ۳۰ هزار تومان، چند واحد است؟","options":["۴,۰۰۰","۶,۶۶۷","۱۰,۰۰۰","۲۰,۰۰۰"],"answer":2,"explanation":"نقطه سربه‌سر = هزینه ثابت ÷ حاشیه فروش واحد = ۲۰۰,۰۰۰,۰۰۰ ÷ (۵۰,۰۰۰ − ۳۰,۰۰۰) = ۱۰,۰۰۰ واحد."},{"subject":"منابع انسانی","q":"آموزش «حین کار» (OJT) کدام مزیت را دارد؟","options":["یادگیری در شرایط واقعی شغل با هزینه کمتر","عدم نیاز به مربی","بدون هیچ ریسکی برای تولید","استانداردسازی کامل محتوا"],"answer":0,"explanation":"در OJT کارمند هنگام انجام کار واقعی و زیر نظر فرد باتجربه می‌آموزد؛ انتقال یادگیری بالا و هزینه جداگانه آموزش پایین است."},{"subject":"رفتار سازمانی","q":"«اندیشه گروهی» (Groupthink) چه زمانی رخ می‌دهد؟","options":["وقتی میل به اجماع، ارزیابی واقع‌بینانه گزینه‌ها را سرکوب کند","وقتی گروه اعضای زیادی داشته باشد","وقتی رهبر گروه دموکراتیک باشد","وقتی تعارض سازنده زیاد شود"],"answer":0,"explanation":"در گروه‌های بسیار منسجم، فشار همرنگی باعث می‌شود اعضا تردیدها را بیان نکنند و تصمیم‌های معیوب گرفته شود — پدیده گروه‌اندیشی جانیس."},{"subject":"بازاریابی","q":"ارزش ویژه برند (Brand Equity) به چه اشاره دارد؟","options":["ارزش افزوده‌ای که نام برند به محصول می‌دهد","هزینه ثبت قانونی برند","بودجه تبلیغات سالانه","تعداد شعب فروش"],"answer":0,"explanation":"ارزش ویژه برند مجموعه دارایی‌هایی مانند آگاهی، تداعی‌ها، کیفیت ادراک‌شده و وفاداری است که ارزش محصول را نزد مشتری بالا می‌برد."}]}]},{"id":"psychology","title":"روانشناسی","code":"کد ۱۱۳۳","icon":"🧠","description":"روانشناسی عمومی، رشد، بالینی، آسیب‌شناسی روانی، آمار و روش تحقیق","exams":[{"id":"psy-1","title":"روانشناسی عمومی و رشد","durationMinutes":25,"subjectsLabel":"روانشناسی عمومی، روانشناسی رشد","questions":[{"subject":"روانشناسی عمومی","q":"در شرطی‌سازی کلاسیک پاولف، غذایی که به‌طور طبیعی بزاق ترشح می‌کند چه نامیده می‌شود؟","options":["محرک شرطی","محرک غیرشرطی","پاسخ شرطی","محرک خنثی"],"answer":1,"explanation":"غذا بدون یادگیری قبلی پاسخ (ترشح بزاق) ایجاد می‌کند، پس «محرک غیرشرطی» (UCS) است. زنگ پس از همایندی، محرک شرطی می‌شود."},{"subject":"روانشناسی عمومی","q":"در شرطی‌سازی کنشگر اسکینر، «تقویت منفی» یعنی چه؟","options":["حذف محرک ناخوشایند برای افزایش رفتار","ارائه محرک ناخوشایند برای کاهش رفتار","حذف محرک خوشایند برای کاهش رفتار","همان تنبیه است"],"answer":0,"explanation":"تقویت منفی، برداشتن محرک آزارنده (مثل قطع صدای ناهنجار) است که احتمال تکرار رفتار را «افزایش» می‌دهد؛ تنبیه رفتار را کاهش می‌دهد."},{"subject":"روانشناسی عمومی","q":"کدام برنامه تقویت، مقاوم‌ترین رفتار در برابر خاموشی را ایجاد می‌کند؟","options":["نسبی متغیر","نسبی ثابت","فاصله‌ای ثابت","تقویت پیوسته"],"answer":0,"explanation":"برنامه نسبی متغیر (مانند دستگاه‌های قمار) بالاترین نرخ پاسخ و بیشترین مقاومت در برابر خاموشی را تولید می‌کند."},{"subject":"روانشناسی عمومی","q":"حافظه کوتاه‌مدت طبق پژوهش کلاسیک میلر چند ماده (Chunk) گنجایش دارد؟","options":["۳ ± ۱","۷ ± ۲","۱۰ ± ۲","۱۲ ± ۳"],"answer":1,"explanation":"جورج میلر در مقاله مشهور «عدد جادویی هفت» گنجایش حافظه کوتاه‌مدت را ۷ ± ۲ ماده اعلام کرد."},{"subject":"روانشناسی عمومی","q":"کدام ناحیه مغز نقش اصلی را در تشکیل خاطرات جدید (تحکیم حافظه آشکار) دارد؟","options":["بادامه","هیپوکامپ","مخچه","هیپوتالاموس"],"answer":1,"explanation":"هیپوکامپ در تبدیل حافظه کوتاه‌مدت به بلندمدت آشکار نقش کلیدی دارد (مورد مشهور بیمار H.M). بادامه بیشتر با حافظه هیجانی مرتبط است."},{"subject":"روانشناسی عمومی","q":"طبق نظریه فروید، بخشی از شخصیت که از «اصل واقعیت» پیروی می‌کند کدام است؟","options":["نهاد (Id)","خود (Ego)","فراخود (Superego)","ناهشیار"],"answer":1,"explanation":"خود (ایگو) میان خواسته‌های نهاد (اصل لذت) و معیارهای فراخود (اخلاق) با توجه به واقعیت میانجی‌گری می‌کند."},{"subject":"روانشناسی عمومی","q":"مکانیسم دفاعی «فرافکنی» (Projection) یعنی ............","options":["نسبت دادن احساسات ناپذیرفتنی خود به دیگران","بازگشت به رفتارهای دوره‌های قبلی رشد","توجیه منطقی رفتار نامقبول","جابه‌جایی خشم به هدف کم‌خطرتر"],"answer":0,"explanation":"در فرافکنی، فرد تکانه‌های نامقبول خود (مثل خصومت) را به دیگران نسبت می‌دهد: «او از من متنفر است» به جای «من از او متنفرم»."},{"subject":"روانشناسی رشد","q":"ترتیب صحیح مراحل رشد شناختی پیاژه کدام است؟","options":["حسی‌حرکتی، پیش‌عملیاتی، عملیات عینی، عملیات صوری","پیش‌عملیاتی، حسی‌حرکتی، عملیات عینی، عملیات صوری","حسی‌حرکتی، عملیات عینی، پیش‌عملیاتی، عملیات صوری","عملیات عینی، پیش‌عملیاتی، عملیات صوری، حسی‌حرکتی"],"answer":0,"explanation":"چهار مرحله پیاژه: حسی‌حرکتی (۰-۲)، پیش‌عملیاتی (۲-۷)، عملیات عینی (۷-۱۱) و عملیات صوری (۱۱ به بعد)."},{"subject":"روانشناسی رشد","q":"«نگهداری ذهنی» (Conservation) معمولاً در کدام مرحله پیاژه کسب می‌شود؟","options":["حسی‌حرکتی","پیش‌عملیاتی","عملیات عینی","عملیات صوری"],"answer":2,"explanation":"کودک در مرحله عملیات عینی (۷-۱۱ سالگی) درمی‌یابد که تغییر شکل ظاهری ماده، مقدار آن را تغییر نمی‌دهد."},{"subject":"روانشناسی رشد","q":"طبق نظریه اریکسون، بحران اصلی نوجوانی کدام است؟","options":["اعتماد در برابر بی‌اعتمادی","هویت در برابر سردرگمی نقش","صمیمیت در برابر انزوا","مولد بودن در برابر رکود"],"answer":1,"explanation":"مرحله پنجم اریکسون (۱۲-۱۸ سالگی): نوجوان باید به پاسخ «من کیستم» برسد؛ شکست در آن به سردرگمی نقش می‌انجامد."},{"subject":"روانشناسی رشد","q":"در آزمایش «موقعیت ناآشنا»ی اینزورث، کودکی که هنگام بازگشت مادر به او نزدیک می‌شود و آرام می‌گیرد چه سبک دلبستگی‌ای دارد؟","options":["ایمن","اجتنابی","دوسوگرا (مقاوم)","آشفته"],"answer":0,"explanation":"کودک با دلبستگی ایمن از مادر به‌عنوان پایگاه امن استفاده می‌کند؛ از جدایی ناراحت می‌شود اما در بازگشت به‌سرعت آرام می‌گیرد."},{"subject":"روانشناسی عمومی","q":"انتقال‌دهنده عصبی «دوپامین» با کدام اختلال در سطح بالا و کدام بیماری در سطح پایین مرتبط دانسته شده است؟","options":["اسکیزوفرنی — پارکینسون","افسردگی — آلزایمر","اضطراب — صرع","وسواس — میگرن"],"answer":0,"explanation":"فرضیه دوپامین: فعالیت اضافی دوپامین با علائم مثبت اسکیزوفرنی، و تخریب نورون‌های دوپامینی جسم سیاه با پارکینسون مرتبط است."},{"subject":"روانشناسی رشد","q":"منطقه تقریبی رشد (ZPD) در نظریه ویگوتسکی یعنی ............","options":["فاصله بین توانایی مستقل کودک و توانایی او با کمک
