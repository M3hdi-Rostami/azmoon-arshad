اثر چندانی ندارند؛ میانگین به‌شدت از داده پرت اثر می‌پذیرد."},{"subject":"آمار و روش تحقیق","q":"خطای نوع اول (α) در آزمون فرض یعنی ............","options":["رد فرض صفر درست","پذیرش فرض صفر نادرست","انتخاب نمونه کوچک","خطای اندازه‌گیری ابزار"],"answer":0,"explanation":"خطای نوع اول یعنی نتیجه بگیریم اثری وجود دارد در حالی که واقعاً وجود ندارد (رد H₀ درست). پذیرش H₀ نادرست خطای نوع دوم (β) است."},{"subject":"آمار و روش تحقیق","q":"در توزیع نرمال استاندارد، تقریباً چند درصد داده‌ها در فاصله ±۱ انحراف معیار از میانگین قرار دارند؟","options":["۵۰٪","۶۸٪","۹۵٪","۹۹٪"],"answer":1,"explanation":"قاعده تجربی: ۶۸٪ در ±۱SD، حدود ۹۵٪ در ±۲SD و ۹۹٫۷٪ در ±۳SD."},{"subject":"آمار و روش تحقیق","q":"برای مقایسه میانگین «بیش از دو گروه مستقل» کدام آزمون مناسب است؟","options":["تحلیل واریانس یک‌راهه (ANOVA)","آزمون t مستقل","خی‌دو","همبستگی پیرسون"],"answer":0,"explanation":"ANOVA یک‌راهه میانگین سه گروه یا بیشتر را هم‌زمان مقایسه می‌کند؛ t فقط برای دو گروه است و تکرار آن خطای نوع اول را بالا می‌برد."},{"subject":"آمار و روش تحقیق","q":"ویژگی متمایزکننده «پژوهش آزمایشی واقعی» کدام است؟","options":["دست‌کاری متغیر مستقل و گمارش تصادفی آزمودنی‌ها","استفاده از پرسشنامه استاندارد","حجم نمونه بزرگ","مطالعه در محیط طبیعی"],"answer":0,"explanation":"دو رکن آزمایش واقعی: دست‌کاری فعال متغیر مستقل و گمارش تصادفی به گروه‌ها؛ بدون گمارش تصادفی، طرح شبه‌آزمایشی است."},{"subject":"آمار و روش تحقیق","q":"ضریب همبستگی ۰٫۹- بین دو متغیر نشان‌دهنده چیست؟","options":["رابطه معکوس قوی","رابطه مستقیم قوی","نبود رابطه","رابطه علت و معلولی معکوس"],"answer":0,"explanation":"علامت منفی جهت معکوس و قدر مطلق نزدیک ۱ شدت قوی را نشان می‌دهد؛ همبستگی هرگز به‌تنهایی علیت را اثبات نمی‌کند."},{"subject":"آسیب‌شناسی روانی","q":"بازگشت مکرر و ناخواسته خاطرات سانحه، کابوس و اجتناب از یادآورها، هسته کدام اختلال است؟","options":["اختلال استرس پس از سانحه (PTSD)","اختلال سازگاری","اختلال اضطراب بیماری","اختلال تبدیلی"],"answer":0,"explanation":"PTSD با چهار خوشه علائم مشخص می‌شود: تجربه مجدد (فلاش‌بک/کابوس)، اجتناب، تغییرات منفی شناختی-خلقی و برانگیختگی مفرط."},{"subject":"روانشناسی بالینی","q":"در آزمون هوش وکسلر، میانگین و انحراف معیار IQ به ترتیب کدام است؟","options":["۱۰۰ و ۱۵","۱۰۰ و ۱۰","۹۰ و ۱۵","۱۰۰ و ۲۴"],"answer":0,"explanation":"مقیاس‌های وکسلر IQ انحرافی با میانگین ۱۰۰ و انحراف معیار ۱۵ دارند (در آزمون استنفورد-بینه قدیم SD برابر ۱۶ بود)."}]}]},{"id":"law","title":"حقوق","code":"کد ۱۱۲۶","icon":"⚖️","description":"حقوق مدنی، تجارت، جزا و جرم‌شناسی، آیین دادرسی و حقوق اساسی","exams":[{"id":"law-1","title":"حقوق مدنی و تجارت","durationMinutes":25,"subjectsLabel":"حقوق مدنی، حقوق تجارت","questions":[{"subject":"حقوق مدنی","q":"طبق ماده ۱۹۰ قانون مدنی، کدام‌یک از شرایط اساسی صحت معامله نیست؟","options":["قصد طرفین و رضای آن‌ها","اهلیت طرفین","کتبی بودن قرارداد","مشروعیت جهت معامله"],"answer":2,"explanation":"شرایط ماده ۱۹۰: قصد و رضا، اهلیت، موضوع معین و مشروعیت جهت. کتبی بودن جزء شرایط عمومی صحت نیست و عقود علی‌الاصول رضایی‌اند."},{"subject":"حقوق مدنی","q":"معامله اکراهی چه وضعیتی دارد؟","options":["باطل است","غیرنافذ است و با رضای بعدی مکرَه نافذ می‌شود","صحیح و لازم است","قابل فسخ توسط طرف مقابل است"],"answer":1,"explanation":"ماده ۲۰۹ ق.م: اکراه قصد را از بین نمی‌برد بلکه رضا را معیوب می‌کند؛ پس عقد غیرنافذ است و با اجازه بعدی مکرَه تنفیذ می‌شود."},{"subject":"حقوق مدنی","q":"عقد بیع از نظر ماهیت چه نوع عقدی است؟","options":["تملیکی، معوض و لازم","عهدی، مجانی و جایز","اذنی و جایز","تملیکی و جایز"],"answer":0,"explanation":"بیع مملّک عین به عوض معلوم است (ماده ۳۳۸)؛ عقدی تملیکی، معوض و لازم که جز با خیار یا اقاله قابل انحلال نیست."},{"subject":"حقوق مدنی","q":"اگر مورد معامله هنگام عقد موجود نباشد (مثلاً خانه‌ای که قبلاً سوخته)، بیع چه حکمی دارد؟","options":["باطل است","غیرنافذ است","صحیح است","قابل فسخ است"],"answer":0,"explanation":"ماده ۳۶۱ ق.م: اگر مبیع عین معین باشد و در زمان عقد موجود نباشد، بیع باطل است؛ چون موضوع معامله وجود ندارد."},{"subject":"حقوق مدنی","q":"«خیار مجلس» تا چه زمانی برای طرفین بیع باقی است؟","options":["تا سه روز پس از عقد","مادام که متبایعین از هم جدا نشده‌اند","تا زمان تسلیم مبیع","تا پرداخت کامل ثمن"],"answer":1,"explanation":"ماده ۳۹۷ ق.م: هر یک از متبایعین بعد از عقد فی‌المجلس و مادام که متفرق نشده‌اند اختیار فسخ معامله را دارند."},{"subject":"حقوق مدنی","q":"مسئولیت مدنی مبتنی بر «اتلاف» به چه معناست؟","options":["هرکس مال غیر را تلف کند ضامن است، حتی بدون تقصیر","فقط در صورت تقصیر عمدی مسئولیت ایجاد می‌شود","مسئولیت فقط قراردادی است","تلف‌کننده فقط در صورت علم به مالکیت غیر ضامن است"],"answer":0,"explanation":"ماده ۳۲۸ ق.م: در اتلاف (تلف مستقیم)، تقصیر شرط نیست و صرف استناد تلف به فعل شخص برای ضمان کافی است؛ در تسبیب تقصیر لازم است."},{"subject":"حقوق تجارت","q":"کدام شرکت تجاری، مسئولیت شرکا در آن نامحدود و تضامنی است؟","options":["شرکت سهامی عام","شرکت با مسئولیت محدود","شرکت تضامنی","شرکت مختلط سهامی"],"answer":2,"explanation":"در شرکت تضامنی هر شریک مسئول پرداخت تمام قروض شرکت است (ماده ۱۱۶ ق.ت)؛ در سهامی و بامسئولیت محدود، مسئولیت به آورده محدود است."},{"subject":"حقوق تجارت","q":"حداقل سرمایه برای تأسیس شرکت سهامی عام طبق لایحه اصلاحی قانون تجارت چقدر است؟","options":["یک میلیون ریال","پنج میلیون ریال","ده میلیون ریال","یکصد هزار ریال"],"answer":1,"explanation":"ماده ۵ لایحه اصلاحی ۱۳۴۷: حداقل سرمایه شرکت سهامی عام پنج میلیون ریال و سهامی خاص یک میلیون ریال است."},{"subject":"حقوق تجارت","q":"دارنده چک برای استفاده از مسئولیت تضامنی ظهرنویس‌ها باید ظرف چه مدتی از تاریخ صدور، چک را به بانک ارائه کند؟","options":["۱۵ روز","۴۵ روز","دو ماه","شش ماه"],"answer":0,"explanation":"ماده ۳۱۵ ق.ت: اگر چک در همان مکان صدور قابل پرداخت باشد، دارنده باید ظرف ۱۵ روز مطالبه کند وگرنه دعوی او علیه ظهرنویس‌ها مسموع نیست (برای شهر دیگر ۴۵ روز)."},{"subject":"حقوق تجارت","q":"«برات» با قبول براتگیر چه اثری پیدا می‌کند؟","options":["براتگیر متعهد اصلی پرداخت وجه برات می‌شود","برات‌دهنده از هر مسئولیتی بری می‌شود","برات باطل می‌شود","فقط ظهرنویس مسئول می‌ماند"],"answer":0,"explanation":"با قبولی، براتگیر متعهد اصلی سند می‌شود (ماده ۲۳۰ ق.ت)؛ سایر مسئولان (برات‌دهنده و ظهرنویس‌ها) مسئولیت تضامنی خود را حفظ می‌کنند /* ---------- ابزارهای کمکی ---------- */

const FA_DIGITS = "۰۱۲۳۴۵۶۷۸۹";
function faNum(value) {
  return String(value).replace(/\d/g, (d) => FA_DIGITS[Number(d)]);
}

function formatClock(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function formatPercent(p) {
  const rounded = Math.round(p * 10) / 10;
  return `${faNum(rounded)}٪`;
}

function formatDate(ts) {
  try {
    return new Intl.DateTimeFormat("fa-IR", {
      year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit",
    }).format(new Date(ts));
  } catch (e) {
    return new Date(ts).toLocaleString();
  }
}

function isMostlyLatin(text) {
  const latin = (text.match(/[A-Za-z]/g) || []).length;
  return latin > text.length * 0.3;
}

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") node.className = v;
      else if (k === "text") node.textContent = v;
      else if (k === "html") node.innerHTML = v;
      else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
      else if (v != null) node.setAttribute(k, v); // null/undefined یعنی «اتریبیوت گذاشته نشود» (مثل disabled)
    }
  }
  for (const child of children || []) {
    if (child == null) continue;
    node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return node;
}

function findExam(examId) {

/** ساخت آزمون سریع: سؤالات تصادفی از کل بانک سؤالات */
function buildQuickExam(count) {
  const pool = [];
  for (const group of QUESTION_BANK.groups) {
    for (const exam of group.exams) {
      for (const q of exam.questions) {
        if (q.reading) continue; // سؤالات وابسته به متن، بدون متن معنا ندارند
        pool.push(q);
      }
    }
  }
  // برداشتن تصادفی (Fisher–Yates روی نمونه)
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return {
    id: `quick-${Date.now()}`,
    title: "آزمون سریع (ترکیبی از همه دروس)",
    durationMinutes: 25,
    subjectsLabel: "منتخب تصادفی از کل بانک سؤالات",
    questions: pool.slice(0, count),
  };
}

function startQuickExam() {
  state.customExam = buildQuickExam(20);
  startExam(state.customExam.id);
}

/* ---------- نمره‌دهی کنکوری ---------- */

function scoreExam(exam, answers) {
  let correct = 0;
  let wrong = 0;
  let blank = 0;
  const subjects = {};

  exam.questions.forEach((q, i) => {
    const subj = subjects[q.subject] || (subjects[q.subject] = { correct: 0, wrong: 0, blank: 0, total: 0 });
    subj.total += 1;
    const a = answers[i];
    if (a == null) {
      blank += 1;
      subj.blank += 1;
    } else if (a === q.answer) {
      correct += 1;
      subj.correct += 1;
    } else {
      wrong += 1;
      subj.wrong += 1;
    }
  });

  const total = exam.questions.length;
  // فرمول درصد کنکور: (صحیح×۳ − غلط) ÷ (کل×۳) ×۱۰۰ — حداقل صفر نمایش داده نمی‌شود تا واقعی بماند
  const rawPercent = ((correct * 3 - wrong) / (total * 3)) * 100;
  const percent = Math.round(rawPercent * 10) / 10;

  const subjectRows = Object.entries(subjects).map(([name, s]) => ({
    name,
    ...s,
    percent: Math.round(((s.correct * 3 - s.wrong) / (s.total * 3)) * 1000) / 10,
  }));

  return { correct, wrong, blank, total, percent, subjects: subjectRows };
}

function verdictFor(percent) {
  if (percent >= 60) return { cls: "good", label: "عالی! در تراز رتبه‌های برتر کنکور ارشد", icon: "🏆" };
  if (percent >= 40) return { cls: "good", label: "خیلی خوب — در محدوده قبولی رشته‌های خوب", icon: "✅" };
  if (percent >= 20) return { cls: "mid", label: "قابل قبول — با تمرین بیشتر به تراز قبولی می‌رسید", icon: "📈" };
  return { cls: "bad", label: "نیاز به مطالعه بیشتر — مرور پاسخ‌های تشریحی را از دست ندهید", icon: "📚" };
}

function pctClass(p) {
  if (p >= 40) return "good";
  if (p >= 20) return "mid";
  return "bad";
}

function startTimer() {
  stopTimer();
  state.timerHandle = setInterval(() => {
    state.remainingSec -= 1;
    const timerEl = document.getElementById("examTimer");
    if (timerEl) {
      timerEl.textContent = formatClock(Math.max(0, state.remainingSec));
      timerEl.classList.toggle("low", state.remainingSec <= 60);
    }
    if (state.remainingSec <= 0) {
      finishExam(true);
    }
  }, 1000);
}

/* ---------- جریان آزمون ---------- */

function startExam(examId) {
  const found = findExam(examId);
  if (!found) return;
  state.screen = "exam";
  state.groupId = found.group.id;
  state.examId = examId;
  state.answers = new Array(found.exam.questions.length).fill(null);
  state.flags = new Array(found.exam.questions.length).fill(false);
  state.currentIdx = 0;
  state.remainingSec = (found.exam.durationMinutes || 20) * 60;
  state.result = null;
  startTimer();
  render();
}

function finishExam(timedOut) {
  const found = findExam(state.examId);
  if (!found) return;
  stopTimer();
  const score = scoreExam(found.exam, state.answers);
  const isQuick = found.exam.id.indexOf("quick-") === 0;
  const result = {
    id: `r-${Date.now()}`,
    examId: found.exam.id,
    examTitle: found.exam.title,
    groupTitle: found.group.title,
    date: Date.now(),
    timedOut: !!timedOut,
    answers: state.answers.slice(),
    // برای آزمون سریع، سؤالات را داخل نتیجه ذخیره می‌کنیم تا مرور بعدی ممکن باشد
    ...(isQuick ? { questionsSnapshot: found.exam.questions } : {}),
    ...score,
  };
  saveResult(result);
  state.result = result;
  state.screen = "result";
  state.confirmSheet = null;
  render();
}

function askFinishExam() {
  const unanswered = state.answers.filter((a) => a == null).length;
  state.confirmSheet = {
    title: "پایان آزمون",
    message: unanswered > 0
      ? `هنوز ${faNum(unanswered)} سؤال بی‌پاسخ دارید (بی‌پاسخ نمره منفی ندارد). آزمون تمام شود؟`
      : "همه سؤالات را پاسخ داده‌اید. آزمون تمام شود و کارنامه صادر شود؟",
    confirmLabel: "بله، پایان آزمون",
    onConfirm: () => finishExam(false),
  };
  render();
}

function askExitExam() {
  state.confirmSheet = {
    title: "خروج از آزمون",
    message: "اگر خارج شوید پاسخ‌های این آزمون ذخیره نمی‌شود. مطمئن هستید؟",
    confirmLabel: "بله، خروج",
    danger: true,
    onConfirm: () => {
      stopTimer();
      state.confirmSheet = null;
      goToGroup(state.groupId);
    },
  };
  render();
}

/* ---------- ناوبری ---------- */

function goHome() {
  stopTimer();
  state.screen = "home";
  state.groupId = null;
  state.examId = null;
  state.result = null;
  state.confirmSheet = null;
  render();
}

function goToGroup(groupId) {
  stopTimer();
  state.screen = "group";
  state.groupId = groupId;
  state.confirmSheet = null;
  render();
}

function goToHistory() {
  stopTimer();
  state.screen = "history";
  state.confirmSheet = null;
  render();
}

function goToStats() {
  stopTimer();
  state.screen = "stats";
  state.confirmSheet = null;
  render();
}

function goToMore() {
  stopTimer();
  state.screen = "more";
  state.confirmSheet = null;
  render();
}

function openResult(result) {
  state.result = result;
  state.examId = result.examId;
  state.screen = "result";
  render();
}

function openReview() {
  state.screen = "review";
  render();
}

// دکمه بازگشت اندروید: true یعنی خودمان مدیریت کردیم
window.__handleAndroidBack = function handleAndroidBack() {
  if (state.confirmSheet) {
    state.confirmSheet = null;
    render();
    return true;
  }
  if (state.screen === "exam") {
    askExitExam();
    return true;
  }
  if (state.screen === "review") {
    state.screen = "result";
    render();
    return true;
  }
  if (state.screen === "result") {
    const found = findExam(state.examId);
    if (found) goToGroup(found.group.id); else goToHistory();
    return true;
  }
  if (state.screen === "group" || state.screen === "history" || state.screen === "stats" || state.screen === "more") {
    goHome();
    return true;
  }
  return false;
};

  return el("div", { class: "topbar" }, [
    el("div", {}, [
      el("h1", {}, [onBack ? el("button", { class: "icon-btn", onclick: onBack, "aria-label": "بازگشت", text: "→" }) : null, title]),
      subtitle ? el("div", { class: "sub", text: subtitle }) : null,
    ]),
  ]);
}

function renderHome() {
  const results = loadResults();
  const totalExams = QUESTION_BANK.groups.reduce((n, g) => n + g.exams.length, 0);
  const totalQuestions = QUESTION_BANK.groups.reduce(
    (n, g) => n + g.exams.reduce((m, e) => m + e.questions.length, 0), 0);
  const avg = results.length
    ? results.reduce((s, r) => s + r.percent, 0) / results.length
    : null;

  const frag = [
    renderTopbar(`🎓 ${APP_TITLE}`, "آزمون‌های جامع چهارگزینه‌ای کارشناسی ارشد"),
    el("div", { class: "stats-row" }, [
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: faNum(totalExams) }),
        el("div", { class: "lbl", text: "آزمون" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: faNum(totalQuestions) }),
        el("div", { class: "lbl", text: "سؤال تشریحی‌دار" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: avg == null ? "—" : formatPercent(avg) }),
        el("div", { class: "lbl", text: "میانگین شما" }),
      ]),
    ]),
    el("div", { class: "section-title" }, [
      "رشته‌ها و دروس",
      el("button", { class: "link", onclick: goToHistory, text: `کارنامه‌های من (${faNum(results.length)})` }),
    ]),
  ];

  for (const group of QUESTION_BANK.groups) {
    const examCount = group.exams.length;
    const qCount = group.exams.reduce((n, e) => n + e.questions.length, 0);
    frag.push(
      el("div", { class: "card tappable group-card", onclick: () => goToGroup(group.id) }, [
        el("div", { class: "emoji", text: group.icon || "📖" }),
        el("div", { class: "info" }, [
          el("div", { class: "title" }, [
            group.title,
            group.code ? el("span", { class: "badge", text: group.code }) : null,
          ]),
          el("div", { class: "desc", text: group.description || "" }),
          el("div", { class: "meta", text: `${faNum(examCount)} آزمون · ${faNum(qCount)} سؤال` }),
        ]),
        el("div", { class: "chev", text: "‹" }),
      ]),
    );
  }

  frag.push(el("div", { class: "footer-note", text: "نمره‌دهی مطابق کنکور سراسری: هر ۳ پاسخ غلط، یک پاسخ صحیح را خنثی می‌کند. سؤالات بر اساس منابع و سرفصل‌های رسمی آزمون کارشناسی ارشد طراحی شده‌اند." }));
  return frag;
}

function renderGroup() {
  const group = findGroup(state.groupId);
  if (!group) { goHome(); return []; }

  const frag = [renderTopbar(group.title, group.description, goHome)];

  for (const exam of group.exams) {
    const best = bestScoreFor(exam.id);
    const bestNode = best == null
      ? el("span", { class: "best none", text: "هنوز آزمون نداده‌اید" })
      : el("span", { class: `best ${pctClass(best)}`, text: `بهترین: ${formatPercent(best)}` });

    frag.push(
      el("div", { class: "card tappable exam-card", onclick: () => startExam(exam.id) }, [
        el("div", { class: "row1" }, [
          el("div", { class: "title", text: exam.title }),
          bestNode,
        ]),
        el("div", { class: "meta" }, [
          el("span", { text: `📝 ${faNum(exam.questions.length)} سؤال` }),
          el("span", { text: `⏱ ${faNum(exam.durationMinutes)} دقیقه` }),
          exam.subjectsLabel ? el("span", { text: `📚 ${exam.subjectsLabel}` }) : null,
        ]),
      ]),
    );
  }

  frag.push(el("div", { class: "footer-note", text: "با لمس هر آزمون، آزمون زمان‌دار آغاز می‌شود." }));
  return frag;
}

function renderExam() {
  const found = findExam(state.examId);
  if (!found) { goHome(); return []; }
  const { exam } = found;
  const q = exam.questions[state.currentIdx];
  const answered = state.answers.filter((a) => a != null).length;

  const nav = el("div", { class: "qnav" }, exam.questions.map((_, i) => {
    const classes = ["qbtn"];
    if (state.answers[i] != null) classes.push("answered");
    if (i === state.currentIdx) classes.push("current");
    if (state.flags[i]) classes.push("flagged");
    return el("button", {
      class: classes.join(" "),
      text: faNum(i + 1),
      onclick: () => { state.currentIdx = i; render(); },
    });
  }));

  const reading = q.reading ? (exam.readings || []).find((r) => r.id === q.reading) : null;
  const latinQ = isMostlyLatin(q.q);

  const options = q.options.map((opt, i) => {
    const selected = state.answers[state.currentIdx] === i;
    return el("button", {
      class: `option${selected ? " selected" : ""}${isMostlyLatin(opt) ? " ltr" : ""}`,
      onclick: () => {
        state.answers[state.currentIdx] = selected ? null : i;
        render();
      },
    }, [
      el("span", { class: "key", text: faNum(i + 1) }),
      el("span", { text: opt }),
    ]);
  });

  const isLast = state.currentIdx === exam.questions.length - 1;

  return [
    el("div", { class: "exam-head" }, [
      el("button", { class: "icon-btn", onclick: askExitExam, text: "✕ خروج" }),
      el("div", { style: "font-size:13px;font-weight:700;flex:1;text-align:center;", text: exam.title }),
      el("div", { class: `timer${state.remainingSec <= 60 ? " low" : ""}`, id: "examTimer", text: formatClock(state.remainingSec) }),
    ]),
    el("div", { class: "progress-track" }, [
      el("div", { class: "progress-fill", style: `width:${(answered / exam.questions.length) * 100}%` }),
    ]),
    nav,
    el("div", { class: "card" }, [
      el("span", { class: "subject-tag", text: `${q.subject} · سؤال ${faNum(state.currentIdx + 1)} از ${faNum(exam.questions.length)}` }),
      reading ? el("div", { class: "reading-box", text: reading.text }) : null,
      el("div", { class: `question-text${latinQ ? " ltr" : ""}`, text: q.q }),
      ...options,
    ]),
    // نوار دکمه‌ها پایین صفحه فیکس است تا با کوتاه/بلند شدن سؤال‌ها جابجا نشود
    el("div", { class: "exam-actionbar" }, [
      el("div", { class: "exam-actions" }, [
        el("button", {
          class: "btn btn-outline",
          disabled: state.currentIdx === 0 ? "disabled" : null,
          onclick: () => { if (state.currentIdx > 0) { state.currentIdx -= 1; render(); } },
          text: "قبلی",
        }),
        el("button", {
          class: `btn btn-outline flag-btn${state.flags[state.currentIdx] ? " on" : ""}`,
          onclick: () => { state.flags[state.currentIdx] = !state.flags[state.currentIdx]; render(); },
          text: state.flags[state.currentIdx] ? "⚑ علامت‌دار" : "⚑ علامت‌گذاری",
        }),
        isLast
          ? el("button", { class: "btn btn-primary", onclick: askFinishExam, text: "پایان آزمون" })
          : el("button", {
              class: "btn btn-primary",
              onclick: () => { state.currentIdx += 1; render(); },
              text: "بعدی",
            }),
      ]),
      el("button", { class: "btn btn-danger", onclick: askFinishExam, text: "اتمام آزمون و مشاهده کارنامه" }),
    ]),
  ];
}

function renderScoreRing(percent) {
  const clamped = Math.max(0, Math.min(100, percent));
  const r = 62;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - clamped / 100);
  const color = clamped >= 40 ? "var(--accent)" : clamped >= 20 ? "var(--warn)" : "var(--danger)";
  const ring = el("div", { class: "score-ring" });
  ring.innerHTML =
    `<svg width="148" height="148" viewBox="0 0 148 148">` +
    `<circle cx="74" cy="74" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="11"/>` +
    `<circle cx="74" cy="74" r="${r}" fill="none" stroke="${color}" stroke-width="11" stroke-linecap="round" ` +
    `stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>` +
    `</svg>`;
  ring.appendChild(el("div", { class: "val" }, [
    document.createTextNode(formatPercent(percent)),
    el("small", { text: "با نمره منفی" }),
  ]));
  return ring;
}

function renderResult() {
  const r = state.result;
  if (!r) { goHome(); return []; }
  const verdict = verdictFor(r.percent);
  const found = findExam(r.examId);

  const subjectRows = r.subjects.map((s) => {
    const width = Math.max(0, Math.min(100, s.percent));
    const color = s.percent >= 40 ? "var(--accent)" : s.percent >= 20 ? "var(--warn)" : "var(--danger)";
    return el("div", { class: "subject-row" }, [
      el("div", { class: "head" }, [
        el("span", { text: s.name }),
        el("span", { class: "pct", text: formatPercent(s.percent) }),
      ]),
      el("div", { class: "bar" }, [el("div", { style: `width:${width}%;background:${color}` })]),
      el("div", { class: "detail", text: `صحیح ${faNum(s.correct)} · غلط ${faNum(s.wrong)} · بی‌پاسخ ${faNum(s.blank)} از ${faNum(s.total)} سؤال` }),
    ]);
  });

  return [
    renderTopbar("کارنامه آزمون", r.examTitle, () => {
      if (found) goToGroup(found.group.id); else goToHistory();
    }),
    el("div", { class: "card score-hero" }, [
      renderScoreRing(r.percent),
      el("div", { class: `score-verdict ${verdict.cls}`, text: `${verdict.icon} ${verdict.label}` }),
      el("div", { class: "score-sub", text: `${r.groupTitle} · ${formatDate(r.date)}${r.timedOut ? " · وقت آزمون تمام شد" : ""}` }),
    ]),
    el("div", { class: "result-grid" }, [
      el("div", { class: "stat-box" }, [
        el("div", { class: "num ok", text: faNum(r.correct) }),
        el("div", { class: "lbl", text: "صحیح" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num bad", text: faNum(r.wrong) }),
        el("div", { class: "lbl", text: "غلط" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num blank", text: faNum(r.blank) }),
        el("div", { class: "lbl", text: "بی‌پاسخ" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num info", text: faNum(r.total) }),
        el("div", { class: "lbl", text: "کل سؤالات" }),
      ]),
    ]),
    el("div", { class: "section-title" }, ["کارنامه به تفکیک درس"]),
    el("div", { class: "card" }, subjectRows),
    (found || r.questionsSnapshot)
      ? el("button", { class: "btn btn-primary", onclick: openReview, text: "مرور سؤالات و پاسخ‌های تشریحی" })
      : null,
    found ? el("button", { class: "btn btn-outline", onclick: () => startExam(r.examId), text: "آزمون مجدد" }) : null,
    el("button", { class: "btn btn-outline", onclick: goHome, text: "بازگشت به خانه" }),
  ];
}

function renderReview() {
  const r = state.result;
  if (!r) { goHome(); return []; }
  const found = findExam(r.examId);
  // برای آزمون سریع (یا آزمونی که دیگر در بانک نیست) از نسخه ذخیره‌شده در نتیجه استفاده می‌کنیم
  const exam = found ? found.exam : (r.questionsSnapshot ? { title: r.examTitle, questions: r.questionsSnapshot, readings: [] } : null);
  if (!exam) { goHome(); return []; }

  const cards = exam.questions.map((q, i) => {
    const user = r.answers[i];
    const isBlank = user == null;
    const isCorrect = user === q.answer;
    const status = isBlank
      ? el("span", { class: "review-status blank", text: "بی‌پاسخ" })
      : isCorrect
        ? el("span", { class: "review-status ok", text: "صحیح" })
        : el("span", { class: "review-status bad", text: "غلط" });

    const reading = q.reading ? (exam.readings || []).find((x) => x.id === q.reading) : null;

    const options = q.options.map((opt, oi) => {
      const classes = ["option"];
      if (isMostlyLatin(opt)) classes.push("ltr");
      if (oi === q.answer) classes.push("correct");
      else if (oi === user) classes.push("wrong");
      return el("div", { class: classes.join(" ") }, [
        el("span", { class: "key", text: faNum(oi + 1) }),
        el("span", { text: opt }),
      ]);
    });

    return el("div", { class: "card review-q" }, [
      el("div", { class: "qhead" }, [
        el("span", { class: "qnum", text: `سؤال ${faNum(i + 1)} · ${q.subject}` }),
        status,
      ]),
      reading ? el("div", { class: "reading-box", text: reading.text }) : null,
      el("div", { class: `question-text${isMostlyLatin(q.q) ? " ltr" : ""}`, style: "font-size:14px;", text: q.q }),
      ...options,
      el("div", { class: "explanation", html: `<b>پاسخ تشریحی:</b> ` }),
    ]);
  });

  // متن تشریحی را امن (بدون HTML خام) اضافه می‌کنیم
  cards.forEach((card, i) => {
    const exp = card.querySelector(".explanation");
    exp.appendChild(document.createTextNode(exam.questions[i].explanation));
  });

  return [
    renderTopbar("مرور پاسخ‌ها", r.examTitle, () => { state.screen = "result"; render(); }),
    ...cards,
    el("button", { class: "btn btn-outline", onclick: () => { state.screen = "result"; render(); }, text: "بازگشت به کارنامه" }),
  ];
}

function renderHistory() {
  const results = loadResults();

  const items = results.map((r) =>
    el("div", { class: "card tappable history-item", onclick: () => openResult(r) }, [
      el("div", { class: "row1" }, [
        el("div", {}, [
          el("div", { class: "title", text: r.examTitle }),
          el("div", { class: "date", text: `${r.groupTitle} · ${formatDate(r.date)}` }),
        ]),
        el("div", { class: `pct ${pctClass(r.percent)}`, text: formatPercent(r.percent) }),
      ]),
    ]));

  return [
    renderTopbar("کارنامه‌های من", `${faNum(results.length)} آزمون ثبت‌شده`, goHome),
    results.length === 0
      ? el("div", { class: "empty-note", text: "هنوز آزمونی نداده‌اید.\nاز صفحه اصلی یک رشته را انتخاب کنید و اولین آزمون خود را شروع کنید. 🎯" })
      : null,
    ...items,
  ];
}

function renderStats() {
  const results = loadResults();
  const avg = results.length ? results.reduce((s, r) => s + r.percent, 0) / results.length : null;
  const best = results.length ? Math.max(...results.map((r) => r.percent)) : null;

  const frag = [
    renderTopbar("آمار پیشرفت", "نمای کلی عملکرد شما در آزمون‌ها", goHome),
    el("div", { class: "stats-row" }, [
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: faNum(results.length) }),
        el("div", { class: "lbl", text: "آزمون داده‌شده" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: avg == null ? "—" : formatPercent(avg) }),
        el("div", { class: "lbl", text: "میانگین درصد" }),
      ]),
      el("div", { class: "stat-box" }, [
        el("div", { class: "num", text: best == null ? "—" : formatPercent(best) }),
        el("div", { class: "lbl", text: "بهترین درصد" }),
      ]),
    ]),
    el("div", { class: "section-title" }, ["وضعیت هر رشته"]),
  ];

  for (const group of QUESTION_BANK.groups) {
    const rows = group.exams.map((exam) => {
      const bestPct = bestScoreFor(exam.id);
      const attempts = loadResults().filter((r) => r.examId === exam.id).length;
      const width = bestPct == null ? 0 : Math.max(0, Math.min(100, bestPct));
      const color = bestPct == null ? "var(--surface-2)"
        : bestPct >= 40 ? "var(--accent)" : bestPct >= 20 ? "var(--warn)" : "var(--danger)";
      return el("div", { class: "subject-row" }, [
        el("div", { class: "head" }, [
          el("span", { text: exam.title }),
          el("span", { class: "pct", text: bestPct == null ? "—" : formatPercent(bestPct) }),
        ]),
        el("div", { class: "bar" }, [el("div", { style: `width:${width}%;background:${color}` })]),
        el("div", { class: "detail", text: attempts ? `${faNum(attempts)} بار آزمون داده‌اید` : "هنوز آزمون نداده‌اید" }),
      ]);
    });

    frag.push(
      el("div", { class: "card" }, [
        el("div", { style: "font-weight:700;font-size:14px;margin-bottom:12px;", text: `${group.icon || "📖"} ${group.title}` }),
        ...rows,
      ]),
    );
  }

  return frag;
}

function appVersionLabel() {
  try {
    if (typeof AndroidApp !== "undefined" && AndroidApp.getContentVersion) {
      return AndroidApp.getContentVersion();
    }
  } catch (e) { /* - */ }
  return (typeof APP_UPDATE_CONFIG !== "undefined" && APP_UPDATE_CONFIG.currentVersion) || "—";
}

function renderMore() {
  const themeRow = el("button", { class: "market-more-row", type: "button", onclick: toggleTheme }, [
    el("span", { class: "market-more-row-label", text: "تم اپلیکیشن" }),
    el("span", { class: "market-more-row-value", id: "themeToggleValue", text: currentTheme() === "light" ? "تم روشن" : "تم تاریک" }),
  ]);

  const copyright = el("p", { class: "market-more-copyright" });
  copyright.innerHTML =
    'طراحی و توسعه توسط <a href="https://t.me/m3hdi_v1" target="_blank" rel="noopener noreferrer" dir="ltr" class="accent">m3hdi_v1</a> | ' +
    `<span id="currentYear">${new Date().getFullYear()}</span> &copy;`;

  return [
    renderTopbar("بیشتر", null, goHome),
    el("section", { class: "market-more-section" }, [
      el("h3", { class: "market-more-section-title", text: "ظاهر" }),
      themeRow,
    ]),
    el("section", { class: "market-more-section" }, [
      el("h3", { class: "market-more-section-title", text: "آزمون" }),
      el("div", { class: "market-more-row market-more-row-static" }, [
        el("span", { class: "market-more-row-label", text: "تعداد آزمون‌ها" }),
        el("span", { class: "market-more-row-value", text: faNum(QUESTION_BANK.groups.reduce((n, g) => n + g.exams.length, 0)) }),
      ]),
      el("div", { class: "market-more-row market-more-row-static" }, [
        el("span", { class: "market-more-row-label", text: "تعداد سؤالات" }),
        el("span", { class: "market-more-row-value", text: faNum(QUESTION_BANK.groups.reduce((n, g) => n + g.exams.reduce((m, e) => m + e.questions.length, 0), 0)) }),
      ]),
      el("p", { class: "market-more-hint", text: "نمره‌دهی مطابق کنکور سراسری است: هر ۳ پاسخ غلط، یک پاسخ صحیح را خنثی می‌کند." }),
    ]),
    el("section", { class: "market-more-section", id: "appUpdateSection" }, [
      el("h3", { class: "market-more-section-title", text: "درباره" }),
      el("div", { class: "market-more-row market-more-row-static" }, [
        el("span", { class: "market-more-row-label", text: "نسخه اپلیکیشن" }),
        el("span", { class: "market-more-row-value", id: "appContentVersion", text: appVersionLabel() }),
      ]),
      el("p", { class: "market-more-hint", text: "بروزرسانی‌ها به‌صورت خودکار بررسی می‌شوند و در صورت وجود نسخه جدید، از شما تأیید گرفته می‌شود." }),
    ]),
    copyright,
  ];
}

function renderConfirmSheet() {
  const sheet = state.confirmSheet;
  if (!sheet) return null;
  return el("div", {
    class: "sheet-backdrop",
    onclick: (ev) => {
      if (ev.target.classList.contains("sheet-backdrop")) {
        state.confirmSheet = null;
        render();
      }
    },
  }, [
    el("div", { class: "sheet" }, [
      el("h3", { text: sheet.title }),
      el("p", { text: sheet.message }),
      el("button", {
        class: `btn ${sheet.danger ? "btn-danger" : "btn-primary"}`,
        onclick: () => { const fn = sheet.onConfirm; state.confirmSheet = null; fn(); },
        text: sheet.confirmLabel,
      }),
      el("button", {
        class: "btn btn-outline",
        onclick: () => { state.confirmSheet = null; render(); },
        text: "انصراف",
      }),
    ]),
  ]);
}

function render() {
  appEl.innerHTML = "";
  let nodes = [];
  if (state.screen === "home") nodes = renderHome();
  else if (state.screen === "group") nodes = renderGroup();
  else if (state.screen === "exam") nodes = renderExam();
  else if (state.screen === "result") nodes = renderResult();
  else if (state.screen === "review") nodes = renderReview();
  else if (state.screen === "history") nodes = renderHistory();
  else if (state.screen === "stats") nodes = renderStats();
  else if (state.screen === "more") nodes = renderMore();

  for (const node of nodes) {
    if (node) appEl.appendChild(node);
  }

  // ناوبری پایین در همه صفحات به‌جز حین آزمون
  const navVisible = state.screen !== "exam";
  document.body.classList.toggle("has-bottom-nav", navVisible);
  document.body.classList.toggle("exam-mode", state.screen === "exam");
  if (navVisible) appEl.appendChild(renderBottomNav());

  const sheetNode = renderConfirmSheet();
  if (sheetNode) appEl.appendChild(sheetNode);

  if (state.screen !== "exam") window.scrollTo(0, 0);
}

applyTheme(currentTheme());
render();

  </script>
  <script>
(function () {
  // پل بروزرسانی اندروید — پورت‌شده از اپلیکیشن قیمت دلار و طلا (market-prices)
  // Kotlin از طریق window.__onAppUpdate* با این اسکریپت صحبت می‌کند.

  const UPDATE_CHECK_INTERVAL_MS = 5 * 60 * 1000;
  let audioCtx = null;
  const UPDATE_SUCCESS_SOUND_KEY = "azmoon-arshad-play-update-success";

  function updateArgs() {
    return [
      APP_UPDATE_CONFIG.repoOwner,
      APP_UPDATE_CONFIG.repoName,
      APP_UPDATE_CONFIG.branch,
    ];
  }

  function getAudioContext() {
    try {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === "suspended") audioCtx.resume().catch(function () {});
      return audioCtx;
    } catch {
      return null;
    }
  }

  function playNotificationTone(sequence) {
    const ctx = getAudioContext();
    if (!ctx) return;
    const master = ctx.createGain();
    master.gain.value = 0.18;
    master.connect(ctx.destination);
    let t = ctx.currentTime + 0.02;
    sequence.forEach(function (note) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = note.type || "sine";
      osc.frequency.value = note.freq;
      osc.connect(gain);
      gain.connect(master);
      const dur = note.dur || 0.14;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.85, t + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.start(t);
      osc.stop(t + dur + 0.03);
      t += note.gap != null ? note.gap : dur * 0.62;
    });
  }

  function playUpdateAvailableSound() {
    playNotificationTone([
      { freq: 880, dur: 0.1, gap: 0.08, type: "sine" },
      { freq: 1174.66, dur: 0.14, gap: 0.06, type: "sine" },
      { freq: 1567.98, dur: 0.18, type: "triangle" },
    ]);
  }

  function playUpdateCompleteSound() {
    playNotificationTone([
      { freq: 523.25, dur: 0.08, gap: 0.06, type: "sine" },
      { freq: 659.25, dur: 0.08, gap: 0.06, type: "sine" },
      { freq: 783.99, dur: 0.1, gap: 0.06, type: "triangle" },
      { freq: 1046.5, dur: 0.2, type: "sine" },
    ]);
  }

  function markUpdateSuccessSound() {
    try { sessionStorage.setItem(UPDATE_SUCCESS_SOUND_KEY, "1"); } catch {}
  }

  function playUpdateSuccessSoundIfPending() {
    try {
      if (sessionStorage.getItem(UPDATE_SUCCESS_SOUND_KEY) !== "1") return;
      sessionStorage.removeItem(UPDATE_SUCCESS_SOUND_KEY);
    } catch {
      return;
    }
    window.setTimeout(playUpdateCompleteSound, 350);
  }

  function initUpdatePrompt() {
    if (typeof AndroidApp === "undefined" || typeof APP_UPDATE_CONFIG === "undefined") return;

    const overlay = document.getElementById("updateSheetOverlay");
    const sheet = document.getElementById("updateSheet");
    const titleEl = document.getElementById("updateSheetTitle");
    const messageEl = document.getElementById("updateSheetMessage");
    const confirmBtn = document.getElementById("updateSheetConfirmBtn");
    const progressWrap = document.getElementById("updateSheetProgress");
    const progressFill = document.getElementById("updateSheetProgressFill");
    const progressLabel = document.getElementById("updateSheetProgressLabel");
    const progressPercent = document.getElementById("updateSheetProgressPercent");
    if (!overlay || !sheet || !messageEl || !confirmBtn) return;

    let isDownloading = false;
    let fakeProgressTimer = null;
    const persianDigitsMap = "۰۱۲۳۴۵۶۷۸۹";
    const toFa = function (n) {
      return String(n).replace(/\d/g, function (d) { return persianDigitsMap[+d]; });
    };

    function syncVersionDisplay(version) {
      const versionEl = document.getElementById("appContentVersion");
      if (versionEl && version) versionEl.textContent = version;
    }

    function notifySheetOpen(open) {
      try { AndroidApp.setUpdateSheetOpen(open); } catch {}
    }

    function stopFakeProgress() {
      if (fakeProgressTimer) {
        window.clearInterval(fakeProgressTimer);
        fakeProgressTimer = null;
      }
    }

    function startFakeProgress() {
      stopFakeProgress();
      let value = 4;
      fakeProgressTimer = window.setInterval(function () {
        if (!isDownloading) {
          stopFakeProgress();
          return;
        }
        value = Math.min(90, value + Math.max(1, Math.round((90 - value) * 0.08)));
        setProgress(value, "در حال دریافت بروزرسانی...");
      }, 450);
    }

    function setProgress(percent, label) {
      const value = Math.max(0, Math.min(100, Math.round(percent || 0)));
      if (progressFill) progressFill.style.width = value + "%";
      if (progressPercent) progressPercent.textContent = toFa(value) + "٪";
      if (progressLabel && label) progressLabel.textContent = label;
    }

    function enterDownloadingState() {
      isDownloading = true;
      sheet.classList.add("downloading");
      if (progressWrap) progressWrap.classList.remove("hidden");
      if (titleEl) titleEl.textContent = "در حال بروزرسانی";
      messageEl.textContent = "لطفاً صبر کنید تا دریافت نسخه جدید کامل شود.";
      setProgress(0, "شروع دریافت فایل‌ها...");
      startFakeProgress();
      confirmBtn.disabled = true;
    }

    function exitDownloadingState() {
      isDownloading = false;
      stopFakeProgress();
      sheet.classList.remove("downloading");
      confirmBtn.disabled = false;
    }

    function ensureUpdateSheetVisible() {
      overlay.classList.remove("hidden");
      requestAnimationFrame(function () {
        overlay.classList.add("open");
        notifySheetOpen(true);
        overlay.setAttribute("aria-hidden", "false");
      });
    }

    function showUpdateSheet(latestVersion, currentVersion, updateKind) {
      if (isDownloading) return;
      if (overlay.classList.contains("open") && sheet.classList.contains("downloading")) return;

      overlay.dataset.latestVersion = latestVersion;
      overlay.dataset.updateKind = updateKind || "content";
      if (titleEl) {
        titleEl.textContent = updateKind === "apk"
          ? "نسخه جدید اپلیکیشن موجود است"
          : "بروزرسانی محتوا موجود است";
      }
      messageEl.textContent = updateKind === "apk"
        ? ("نسخه " + latestVersion + " منتشر شده است. نسخه فعلی شما " + currentVersion + " است. با تأیید، کل اپلیکیشن (همراه با بانک سؤالات) بروزرسانی می‌شود.")
        : ("نسخه " + latestVersion + " منتشر شده است. نسخه فعلی شما " + currentVersion + " است. فقط محتوای داخل اپ (بانک سؤالات) بروزرسانی می‌شود.");
      if (progressWrap) progressWrap.classList.add("hidden");
      sheet.classList.remove("downloading");
      confirmBtn.textContent = updateKind === "apk" ? "بروزرسانی اپلیکیشن" : "بروزرسانی محتوا";
      confirmBtn.disabled = false;
      ensureUpdateSheetVisible();
      playUpdateAvailableSound();
    }

    function startUpdateDownload() {
      if (isDownloading) return;
      ensureUpdateSheetVisible();
      enterDownloadingState();
      try {
        AndroidApp.startAppUpdate.apply(AndroidApp, updateArgs());
      } catch (err) {
        exitDownloadingState();
        if (progressWrap) progressWrap.classList.remove("hidden");
        if (titleEl) titleEl.textContent = "خطا در بروزرسانی";
        messageEl.textContent = "شروع دریافت ممکن نشد. دوباره تلاش کنید.";
        confirmBtn.textContent = "تلاش مجدد";
        confirmBtn.disabled = false;
      }
    }

    window.__startAppUpdateFromSheet = startUpdateDownload;

    window.__onAppUpdateProgress = function (progress) {
      if (!progress) return;
      stopFakeProgress();
      const percent = Number(progress.percent) || 0;
      const done = Number(progress.done) || 0;
      const total = Number(progress.total) || 0;
      const label = progress.label
        || (total > 0
          ? ("دریافت فایل " + toFa(Math.min(Math.max(done, 1), total)) + " از " + toFa(total))
          : "در حال دریافت بروزرسانی...");
      if (!sheet.classList.contains("downloading")) enterDownloadingState();
      setProgress(percent, label);
    };

    window.__onAppUpdateComplete = function (result) {
      stopFakeProgress();

      if (result && result.needsInstallPermission) {
        isDownloading = true;
        sheet.classList.add("downloading");
        if (progressWrap) progressWrap.classList.remove("hidden");
        if (titleEl) titleEl.textContent = "مجوز نصب اندروید";
        messageEl.textContent = (result && result.message)
          || "یک‌بار اجازه نصب را در تنظیمات فعال کنید. پس از بازگشت، بروزرسانی خودکار ادامه می‌یابد.";
        setProgress(0, "در انتظار فعال‌سازی مجوز...");
        confirmBtn.textContent = "باز کردن تنظیمات";
        confirmBtn.disabled = false;
        return;
      }

      if (!result || !result.success) {
        exitDownloadingState();
        if (progressWrap) progressWrap.classList.remove("hidden");
        if (titleEl) titleEl.textContent = "خطا در بروزرسانی";
        messageEl.textContent = (result && result.message) || "دریافت نسخه جدید ناموفق بود.";
        setProgress(0, "لطفاً دوباره تلاش کنید");
        confirmBtn.textContent = "تلاش مجدد";
        confirmBtn.disabled = false;
        return;
      }

      if (result.awaitingInstall) {
        isDownloading = true;
        sheet.classList.add("downloading");
        if (progressWrap) progressWrap.classList.remove("hidden");
        if (titleEl) titleEl.textContent = "تأیید نصب";
        messageEl.textContent = result.message || "در حال نصب نسخه جدید. در صورت نیاز، نصب را در صفحه سیستم تأیید کنید.";
        setProgress(100, "در انتظار نصب...");
        return;
      }

      setProgress(100, "بروزرسانی کامل شد");
      if (titleEl) titleEl.textContent = "بروزرسانی موفق";
      messageEl.textContent = result.message || "نسخه جدید با موفقیت دریافت شد.";
      if (result.latestVersion) syncVersionDisplay(result.latestVersion);
      if (result.success && result.reloaded) {
        messageEl.textContent = "نسخه جدید نصب شد. در حال بارگذاری مجدد...";
        markUpdateSuccessSound();
        playUpdateCompleteSound();
      }
      if (result.updateKind === "apk" && result.success && !result.awaitingInstall) {
        exitDownloadingState();
        confirmBtn.textContent = "تلاش مجدد";
      }
    };

    window.__onAppUpdateCheckComplete = function (result) {
      if (isDownloading) return;
      if (!result || !result.success || !result.hasUpdate) return;
      showUpdateSheet(result.latestVersion, result.currentVersion, result.updateKind);
    };

    confirmBtn.addEventListener("click", function () {
      startUpdateDownload();
    });

    function runUpdateCheck() {
      if (isDownloading) return;
      try {
        AndroidApp.checkForAppUpdate.apply(AndroidApp, updateArgs());
      } catch {}
    }

    window.setTimeout(runUpdateCheck, 12000);
    window.setInterval(runUpdateCheck, UPDATE_CHECK_INTERVAL_MS);
  }

  try { localStorage.removeItem("azmoon-arshad-update-dismissed"); } catch {}

  playUpdateSuccessSoundIfPending();
  initUpdatePrompt();
})();

  </script>
